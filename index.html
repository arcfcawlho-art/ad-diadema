  (async function() {
    const files = ['src/constants.js','src/db.js','src/components.js','src/auth.js','src/home.js','src/membros.js','src/infantil.js','src/agenda.js','src/oracao.js','src/escalas.js','src/secretaria.js','src/app.js'];
    const root = document.getElementById("root");

    function showErr(msg, detail) {
      root.innerHTML =
        '<div style="padding:24px;font-family:system-ui">' +
        '<div style="color:#dc2626;font-size:17px;font-weight:700;margin-bottom:8px">⚠️ ' + msg + '</div>' +
        '<div style="color:#64748b;font-size:13px;line-height:1.6">' + detail + '</div>' +
        '<div style="margin-top:16px;font-size:12px;color:#94a3b8">Tente recarregar a página (F5)</div>' +
        '</div>';
    }

    root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px;font-family:system-ui"><div style="width:40px;height:40px;border:3px solid #f1f5f9;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite"></div><div style="color:#94a3b8;font-size:13px">Carregando AD Diadema...</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';

    try {
      // Aguardar React carregar (até 15s)
      let t = 0;
      while ((typeof React === "undefined" || typeof ReactDOM === "undefined") && t++ < 150) {
        await new Promise(r => setTimeout(r, 100));
      }
      if (typeof React === "undefined") { showErr("React não carregou", "Verifique sua conexão com a internet."); return; }

      // Aguardar Babel carregar (até 15s)
      t = 0;
      while (typeof Babel === "undefined" && t++ < 150) {
        await new Promise(r => setTimeout(r, 100));
      }
      if (typeof Babel === "undefined") { showErr("Babel não carregou", "Verifique sua conexão com a internet."); return; }

      // Carregar arquivos em paralelo (mais rápido)
      const v = Date.now();
      const fetches = await Promise.all(
        files.map(src => fetch(src + "?v=" + v)
          .then(r => { if (!r.ok) throw new Error(src + " → HTTP " + r.status); return r.text(); })
          .then(code => "\n// ═══ " + src + " ═══\n" + code)
        )
      );
      const combined = fetches.join("\n");

      // Compilar com Babel
      const result = Babel.transform(combined, { presets: ["react"] });

      // Executar
      const s = document.createElement("script");
      s.textContent = result.code;
      document.head.appendChild(s);

    } catch(err) {
      console.error("Loader error:", err);
      showErr("Erro ao carregar", err.message);
    }
  })();
  </script>

</body>
</html>
