const CRYPTO_KEY_NAME = "ad_diadema_key_v1";

async function getCryptoKey() {
  try {
    const stored = await window.storage.get(CRYPTO_KEY_NAME);
    if (stored?.value) {
      const raw = Uint8Array.from(atob(stored.value), c => c.charCodeAt(0));
      return await crypto.subtle.importKey("raw", raw, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
    }
  } catch(e) {}
  const key = await crypto.subtle.generateKey({name:"AES-GCM",length:256}, true, ["encrypt","decrypt"]);
  const raw = await crypto.subtle.exportKey("raw", key);
  const b64 = btoa(String.fromCharCode(...new Uint8Array(raw)));
  try { await window.storage.set(CRYPTO_KEY_NAME, b64); } catch(e) {}
  return key;
}

async function encryptData(obj) {
  try {
    const key = await getCryptoKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const data = enc.encode(JSON.stringify(obj));
    const cipher = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, data);
    const combined = new Uint8Array(iv.byteLength + cipher.byteLength);
    combined.set(iv); combined.set(new Uint8Array(cipher), iv.byteLength);
    return btoa(String.fromCharCode(...combined));
  } catch(e) { return JSON.stringify(obj); }
}

async function decryptData(b64) {
  try {
    const key = await getCryptoKey();
    const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv = combined.slice(0, 12);
    const cipher = combined.slice(12);
    const plain = await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, cipher);
    return JSON.parse(new TextDecoder().decode(plain));
  } catch(e) {
    try { return JSON.parse(b64); } catch(e2) { return null; }
  }
}

// ── STORAGE: localStorage como primário, window.storage como fallback ────────
async function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  try { await window.storage.set(key, value); } catch(e) {}
  // church_auth vai também para Firebase para sincronização entre dispositivos
  if (key === "church_auth") {
    try { await fbSet("church_auth", JSON.parse(value)); } catch(e) {}
  }
}
async function storageGet(key) {
  // Tentar localStorage primeiro
  try {
    const v = localStorage.getItem(key);
    if (v) return {value: v};
  } catch(e) {}
  // Fallback: window.storage
  try {
    const r = await window.storage.get(key);
    if (r?.value) {
      // Sincronizar de volta ao localStorage
      try { localStorage.setItem(key, r.value); } catch(e2) {}
      return r;
    }
  } catch(e) {}
  return null;
}

async function saveEncrypted(key, obj) {
  const enc = await encryptData(obj);
  await storageSet(key, enc);
}

// Inicializar Firebase via CDN (carregado no HTML)
let firebaseDB = null;

function initFirebase() {
  try {
    if (typeof firebase !== "undefined" && !firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    if (typeof firebase !== "undefined") {
      firebaseDB = firebase.database();
    }
  } catch(e) {
    console.warn("Firebase nao disponivel, usando storage local:", e);
  }
}
// Auto-inicializar Firebase quando scripts carregarem
if (typeof window !== "undefined") {
  window.addEventListener("load", () => { try { initFirebase(); } catch(e) {} });
}

async function fbSet(path, data) {
  if (!firebaseDB) return false;
  try {
    await firebaseDB.ref(path).set(data);
    return true;
  } catch(e) { console.warn("fbSet error:", e); return false; }
}

async function fbGet(path) {
  if (!firebaseDB) return null;
  try {
    const snap = await firebaseDB.ref(path).get();
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.warn("fbGet error:", e); return null; }
}

function fbListen(path, callback) {
  if (!firebaseDB) return () => {};
  const ref = firebaseDB.ref(path);
  ref.on("value", snap => callback(snap.exists() ? snap.val() : null));
  return () => ref.off("value");
}

async function loadEncrypted(key) {
  try {
    const r = await storageGet(key);
    if (!r?.value) return null;
    return await decryptData(r.value);
  } catch(e) { return null; }
}

function resizeFoto(dataUrl, maxW=400, quality=0.82) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", quality));
    };
    img.src = dataUrl;
  });
}

const SUPER_ADMIN = {
  id: 1,
  nome: "Fabricio de Carvalho",
  pin: hashPin("5779"),
  nivel: "super",
  cadastroCompleto: true
};

function PinLogin({onLogin}) {
  // phases: "lock" | "login" | "cadastro"
  const [phase, setPhase]   = useState("lock");
  const [loginNome, setLoginNome] = useState("");
  const [loginPin, setLoginPin]   = useState("");
  const [loginErr, setLoginErr]   = useState("");
  const [loginLoading, setLoginLoading] = useState(false);
  const [success, setSuccess] = useState(false);
  const [ready, setReady]   = useState(false);

  // Cadastro novo (formulário de membro + PIN)
  const [cadStep, setCadStep] = useState(1); // 1=dados pessoais, 2=criar PIN
  const [cadForm, setCadForm] = useState({
    nome:"", cpf:"", nascimento:"", sexo:"", estadoCivil:"", telefone:"",
    email:"", cidade:"", cargo:"Membro", ministerio:"Nenhum",
    pin:"", confirmar:"", lgpd:false
  });
  const [cadErr, setCadErr]   = useState("");
  const [cadOk, setCadOk]     = useState(false);
  const [lockCount, setLockCount] = useState(10);

  const authRef = useRef(null);

  // ── Inicializar auth — Firebase como fonte principal ────────────────────────
  useEffect(() => {
    (async () => {
      initFirebase();

      // Tentar carregar do Firebase primeiro, fallback localStorage
      let loaded = null;
      try {
        const fb = await fbGet("church_auth");
        if (fb) {
          loaded = fb;
          // Sincronizar para localStorage como cache
          try { localStorage.setItem("church_auth", JSON.stringify(fb)); } catch(e) {}
        }
      } catch(e) {}

      if (!loaded) {
        // Fallback: localStorage
        try {
          const r = localStorage.getItem("church_auth");
          if (r) loaded = JSON.parse(r);
        } catch(e) {}
      }

      if (!loaded) {
        loaded = {admins:[SUPER_ADMIN], pendentes:[], users:[]};
      } else {
        if (!loaded.pendentes) loaded.pendentes = [];
        if (!loaded.users)     loaded.users = [];
        const temSuper = loaded.admins?.some(a => a.nivel === "super");
        if (!temSuper) {
          loaded.admins = [SUPER_ADMIN, ...(loaded.admins||[])];
        } else {
          loaded.admins = loaded.admins.map(a =>
            a.nivel === "super" ? {...a, nome:SUPER_ADMIN.nome, pin:SUPER_ADMIN.pin, cadastroCompleto:true} : a
          );
        }
        loaded.admins = loaded.admins.map(a => ({...a, cadastroCompleto:true}));
      }

      authRef.current = loaded;

      // Salvar estado inicial no Firebase + localStorage
      try { await fbSet("church_auth", loaded); } catch(e) {}
      try { localStorage.setItem("church_auth", JSON.stringify(loaded)); } catch(e) {}

      // ── Listener em tempo real: se outro dispositivo promover alguém,
      //    atualiza authRef automaticamente (sem precisar relogar)
      fbListen("church_auth", (data) => {
        if (!data) return;
        // Garantir super admin
        if (data.admins) {
          data.admins = data.admins.map(a =>
            a.nivel === "super" ? {...a, nome:SUPER_ADMIN.nome, pin:SUPER_ADMIN.pin, cadastroCompleto:true} : a
          ).map(a => ({...a, cadastroCompleto:true}));
        }
        authRef.current = data;
        try { localStorage.setItem("church_auth", JSON.stringify(data)); } catch(e) {}
      });

      setReady(true);
    })();
  }, []);

  // ── Countdown automático na tela de boas-vindas ────────────────────────────
  useEffect(() => {
    if (phase !== "lock") return;
    setLockCount(2);
    const t = setInterval(() => {
      setLockCount(c => {
        if (c <= 1) { clearInterval(t); setPhase("login"); return 0; }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [phase]);

  // ── Login: busca SEMPRE do Firebase para pegar promoções em tempo real ────
  async function tryLogin() {
    const n = loginNome.trim();
    const p = loginPin.trim();
    if (!n || n.length < 2) { setLoginErr("Digite seu nome"); return; }
    if (!p || p.length < 4) { setLoginErr("Digite seu PIN (mínimo 4 dígitos)"); return; }

    setLoginLoading(true);
    setLoginErr("");

    // Sempre buscar dados frescos do Firebase (pega promoções feitas por outro device)
    try {
      const fbData = await fbGet("church_auth");
      if (fbData) {
        // Garantir super admin
        if (fbData.admins) {
          fbData.admins = fbData.admins.map(a =>
            a.nivel === "super" ? {...a, nome:SUPER_ADMIN.nome, pin:SUPER_ADMIN.pin, cadastroCompleto:true} : a
          ).map(a => ({...a, cadastroCompleto:true}));
        }
        authRef.current = fbData;
        try { localStorage.setItem("church_auth", JSON.stringify(fbData)); } catch(e) {}
      }
    } catch(e) {}

    const data = authRef.current;
    if (!data) { setLoginErr("Sistema não inicializado"); setLoginLoading(false); return; }

    const hashed = hashPin(p);

    function nomeMatch(cadastrado, digitado) {
      const a = cadastrado.toLowerCase().trim();
      const d = digitado.toLowerCase().trim();
      if (a === d) return true;
      if (a.split(" ")[0] === d.split(" ")[0]) return true;
      if (a.includes(d)) return true;
      if (d.includes(a.split(" ")[0])) return true;
      return false;
    }

    // 1. Buscar em admins (Fabricio + admins promovidos)
    const admin = (data.admins||[]).find(a => a.pin === hashed && nomeMatch(a.nome, n));

    // 2. Buscar em users (usuários comuns cadastrados)
    const user = !admin && (data.users||[]).find(u => u.pin === hashed && nomeMatch(u.nome, n));

    const encontrado = admin || user;

    if (encontrado) {
      setSuccess(true);
      setTimeout(() => onLogin({...encontrado, loginAt:Date.now()}), 800);
    } else {
      setLoginErr("Nome ou PIN incorretos. Verifique e tente novamente.");
    }
    setLoginLoading(false);
  }

  // ── Cadastro: salvar em users — entra direto sem aprovação ─────────────────
  async function handleCadastro() {
    setCadErr("");
    const n = cadForm.nome.trim();
    if (!n || n.length < 3)               { setCadErr("Nome completo obrigatório"); return; }
    if (!cadForm.nascimento)              { setCadErr("Data de nascimento obrigatória"); return; }
    if (!cadForm.sexo)                    { setCadErr("Selecione o sexo"); return; }
    if (!cadForm.telefone || cadForm.telefone.replace(/\D/g,"").length < 10) { setCadErr("Telefone inválido"); return; }
    if (cadForm.pin.length < 4)           { setCadErr("PIN deve ter ao menos 4 dígitos"); return; }
    if (cadForm.pin !== cadForm.confirmar){ setCadErr("PINs não coincidem"); return; }
    if (!cadForm.lgpd)                    { setCadErr("Aceite os termos para continuar"); return; }

    const data = authRef.current;
    // Checar duplicidade em admins e users
    const nLower = n.toLowerCase();
    const existeAdmin = (data.admins||[]).find(a => a.nome.toLowerCase() === nLower);
    if (existeAdmin) { setCadErr("Já existe um usuário com esse nome."); return; }
    const existeUser = (data.users||[]).find(u => u.nome.toLowerCase() === nLower);
    if (existeUser) { setCadErr("Já existe um usuário com esse nome."); return; }

    const novo = {
      id: Date.now(),
      nome: n,
      cpf: cadForm.cpf,
      nascimento: cadForm.nascimento,
      sexo: cadForm.sexo,
      estadoCivil: cadForm.estadoCivil,
      telefone: cadForm.telefone,
      email: cadForm.email,
      cidade: cadForm.cidade,
      cargo: cadForm.cargo || "Membro",
      ministerio: cadForm.ministerio || "Nenhum",
      pin: hashPin(cadForm.pin),
      nivel: "user",
      cadastroCompleto: true,
      cadastradoEm: new Date().toLocaleString("pt-BR")
    };
    data.users = [...(data.users||[]), novo];
    try { await storageSet("church_auth", JSON.stringify(data)); } catch(e) {}

    // ── Criar membro na lista da igreja ──────────────────────────────────────
    try {
      const memberId = novo.id;
      const novoMembro = {
        id: memberId,
        nome: n,
        cpf: cadForm.cpf || "",
        nascimento: cadForm.nascimento || "",
        sexo: cadForm.sexo || "",
        estadoCivil: cadForm.estadoCivil || "",
        telefone: cadForm.telefone || "",
        email: cadForm.email || "",
        endereco: "",
        cidade: cadForm.cidade || "",
        cep: "",
        cargo: cadForm.cargo || "Membro",
        ministerio: cadForm.ministerio || "Nenhum",
        dataBatismo: "",
        dataMembresia: new Date().toISOString().slice(0,10),
        conjugeNome: "",
        filhos: "",
        foto: null,
        ativo: true,
        observacoes: "",
        historicoSaida: []
      };
      // Tentar Firebase primeiro
      let membros = [];
      try {
        const fbData = await fbGet("church/members");
        if (fbData && Array.isArray(fbData)) membros = fbData;
        else {
          const local = await loadEncrypted("church_members");
          if (local) membros = local;
        }
      } catch(e2) {
        try { const local = await loadEncrypted("church_members"); if(local) membros = local; } catch(e3) {}
      }
      const listAtualizada = [...membros, novoMembro];
      await fbSet("church/members", listAtualizada);
      await saveEncrypted("church_members", listAtualizada);
    } catch(e) {}

    setCadOk(true);
  }

  // ── Background ─────────────────────────────────────────────────────────────
  const BG = (
    <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(175deg,#f8f8f8 0%,#f0f0f0 40%,#ebebeb 70%,#f5f5f5 100%)"}} />
      <div style={{position:"absolute",top:"-20%",left:"30%",width:"60%",height:"60%",borderRadius:"50%",background:"radial-gradient(ellipse,rgba(139,50,48,0.08) 0%,transparent 70%)",filter:"blur(40px)"}} />
      {STARS.map(s => (
        <div key={s.id} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.s,height:s.s,borderRadius:"50%",
          background:"#8b3230",opacity:s.op*0.3,animation:`starTwinkle ${s.dur}s ${s.delay}s ease-in-out infinite`}} />
      ))}
    </div>
  );

  if (!ready) return (
    <div style={{minHeight:"100vh",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <style>{LOGIN_CSS}</style>{BG}
      <div style={{width:36,height:36,borderRadius:"50%",border:"2.5px solid #ddd",borderTopColor:"#8b3230",animation:"spinLoader 0.8s linear infinite"}} />
    </div>
  );

  if (phase === "lock") {
    const LOCK_SECS = 2;
    const pct = ((LOCK_SECS - lockCount) / LOCK_SECS) * 100;
    return (
      <div onClick={()=>setPhase("login")} style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",
        justifyContent:"center",fontFamily:"Inter,system-ui,sans-serif",position:"relative",overflow:"hidden",cursor:"pointer"}}>
        <style>{LOGIN_CSS}</style>{BG}
        {/* Barra de progresso no topo */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"rgba(139,50,48,0.1)",zIndex:10}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,#8b3230,#c9a84c)",width:pct+"%",transition:"width 1s linear"}}/>
        </div>
        {/* Logo centralizado */}
        <div style={{textAlign:"center",animation:"fadeUp 0.7s 0.1s ease both",zIndex:1}}>
          <div style={{width:150,height:150,borderRadius:38,background:"#fff",border:"2px solid rgba(139,50,48,0.15)",
            boxShadow:"0 8px 40px rgba(139,50,48,0.18)",display:"flex",alignItems:"center",justifyContent:"center",
            margin:"0 auto 20px",animation:"glowPulse 3s ease-in-out infinite"}}>
            <img src={LOGO_B64} style={{width:116,height:116,objectFit:"contain"}} alt="Logo"/>
          </div>
          <div style={{color:"#8b3230",fontWeight:700,fontSize:18,letterSpacing:0.5}}>Assembleia de Deus</div>
          <div style={{color:"#aaa",fontSize:12,marginTop:5,letterSpacing:3,textTransform:"uppercase"}}>Diadema</div>
        </div>
        {/* Bem-vindo */}
        <div style={{animation:"fadeUp 0.7s 0.4s ease both",zIndex:1,textAlign:"center",marginTop:32}}>
          <div style={{color:"#8b3230",fontSize:22,fontWeight:300,letterSpacing:3}}>Bem-vindo</div>
        </div>
      </div>
    );
  }

  // ── TELA DE CADASTRO ──────────────────────────────────────────────────────────
  if (phase === "cadastro") return (
    <div style={{minHeight:"100vh",background:"#f5f5f5",fontFamily:"Inter,system-ui,sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{LOGIN_CSS}</style>{BG}
      <div style={{maxWidth:440,margin:"0 auto",padding:"24px 20px 60px",position:"relative",zIndex:1}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <button onClick={()=>{setPhase("login");setCadErr("");setCadOk(false);setCadStep(1);}} style={{
            background:"#ececec",border:"1px solid #ddd",borderRadius:20,color:"#888",padding:"6px 14px",
            fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            Voltar
          </button>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"#1a1a1a"}}>Solicitar Acesso</div>
            <div style={{fontSize:11,color:"#888"}}>Passo {cadStep} de 2</div>
          </div>
        </div>

        {cadOk ? (
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:14,padding:"28px 20px",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <div style={{fontWeight:700,fontSize:16,color:"#15803d",marginBottom:8}}>Solicitação enviada!</div>
            <div style={{fontSize:13,color:"#166534",lineHeight:1.7}}>
              Cadastro realizado com sucesso!<br/>
              Agora entre com seu nome e PIN.
            </div>
            <button onClick={()=>{setPhase("login");setCadOk(false);setCadStep(1);setCadForm({nome:"",cpf:"",nascimento:"",sexo:"",estadoCivil:"",telefone:"",email:"",cidade:"",cargo:"Membro",ministerio:"Nenhum",pin:"",confirmar:"",lgpd:false});}} style={{
              marginTop:20,padding:"11px 28px",borderRadius:20,border:"none",
              background:"linear-gradient(135deg,#742a28,#5c1a18)",color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"
            }}>Ir para o login →</button>
          </div>
        ) : cadStep === 1 ? (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f1f5f9"}}>📋 Dados Pessoais</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {[
                  {label:"Nome completo *", key:"nome", type:"text", placeholder:"Seu nome completo"},
                  {label:"CPF", key:"cpf", type:"text", placeholder:"000.000.000-00"},
                  {label:"Data de nascimento *", key:"nascimento", type:"date"},
                  {label:"Telefone *", key:"telefone", type:"tel", placeholder:"(11) 99999-9999"},
                  {label:"E-mail", key:"email", type:"email", placeholder:"seu@email.com"},
                  {label:"Cidade", key:"cidade", type:"text", placeholder:"Cidade"},
                ].map(f => (
                  <div key={f.key}>
                    <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>{f.label}</label>
                    <input type={f.type} placeholder={f.placeholder||""}
                      style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc"}}
                      value={cadForm[f.key]}
                      onChange={e=>{
                        let v = e.target.value;
                        if(f.key==="cpf") v=fCPF(v);
                        if(f.key==="telefone") v=fTel(v);
                        setCadForm(cf=>({...cf,[f.key]:v}));setCadErr("");
                      }}
                    />
                  </div>
                ))}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Sexo *</label>
                    <select style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc",cursor:"pointer"}}
                      value={cadForm.sexo} onChange={e=>{setCadForm(cf=>({...cf,sexo:e.target.value}));setCadErr("");}}>
                      <option value="">Selecione</option>
                      <option>Masculino</option><option>Feminino</option>
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Estado Civil</label>
                    <select style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc",cursor:"pointer"}}
                      value={cadForm.estadoCivil} onChange={e=>setCadForm(cf=>({...cf,estadoCivil:e.target.value}))}>
                      <option value="">Selecione</option>
                      <option>Solteiro(a)</option><option>Casado(a)</option><option>Divorciado(a)</option><option>Viúvo(a)</option>
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Cargo</label>
                    <select style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc",cursor:"pointer"}}
                      value={cadForm.cargo} onChange={e=>setCadForm(cf=>({...cf,cargo:e.target.value}))}>
                      {CARGOS.map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Ministério</label>
                    <select style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#f8fafc",cursor:"pointer"}}
                      value={cadForm.ministerio} onChange={e=>setCadForm(cf=>({...cf,ministerio:e.target.value}))}>
                      {MINISTERIOS.map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                </div>
              </div>
            </div>
            {cadErr && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#dc2626"}}>❌ {cadErr}</div>}
            <button onClick={()=>{
              const n=cadForm.nome.trim();
              if(!n||n.length<3){setCadErr("Nome completo obrigatório");return;}
              if(!cadForm.nascimento){setCadErr("Data de nascimento obrigatória");return;}
              if(!cadForm.sexo){setCadErr("Selecione o sexo");return;}
              if(!cadForm.telefone||cadForm.telefone.replace(/\D/g,"").length<10){setCadErr("Telefone inválido");return;}
              setCadErr("");setCadStep(2);
            }} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",
              background:"linear-gradient(135deg,#742a28,#5c1a18)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",
              boxShadow:"0 4px 16px rgba(116,42,40,0.3)"}}>Próximo →</button>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f1f5f9"}}>🔐 Criar PIN de Acesso</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Criar PIN (4–6 dígitos) *</label>
                  <input type="password" inputMode="numeric" maxLength={6}
                    style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:18,outline:"none",background:"#f8fafc",letterSpacing:8,textAlign:"center"}}
                    value={cadForm.pin} onChange={e=>setCadForm(cf=>({...cf,pin:e.target.value.replace(/\D/g,"")}))}
                    placeholder="• • • •" />
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.3}}>Confirmar PIN *</label>
                  <input type="password" inputMode="numeric" maxLength={6}
                    style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:18,outline:"none",background:"#f8fafc",letterSpacing:8,textAlign:"center"}}
                    value={cadForm.confirmar} onChange={e=>setCadForm(cf=>({...cf,confirmar:e.target.value.replace(/\D/g,"")}))}
                    placeholder="• • • •" />
                </div>
                <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",padding:"12px",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0"}}>
                  <input type="checkbox" checked={cadForm.lgpd} onChange={e=>setCadForm(cf=>({...cf,lgpd:e.target.checked}))}
                    style={{width:16,height:16,marginTop:2,accentColor:"#742a28",flexShrink:0}} />
                  <span style={{fontSize:11,color:"#475569",lineHeight:1.6}}>
                    Concordo com o uso dos meus dados pessoais pela Igreja conforme a <strong>LGPD</strong> (Lei 13.709/2018). As informações serão usadas exclusivamente para gestão eclesiástica.
                  </span>
                </label>
              </div>
            </div>
            {cadErr && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#dc2626"}}>❌ {cadErr}</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setCadStep(1);setCadErr("");}} style={{flex:1,padding:"13px",borderRadius:12,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontWeight:600,fontSize:13,cursor:"pointer"}}>← Voltar</button>
              <button onClick={handleCadastro} style={{flex:2,padding:"13px",borderRadius:12,border:"none",
                background:"linear-gradient(135deg,#742a28,#5c1a18)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",
                boxShadow:"0 4px 16px rgba(116,42,40,0.3)"}}>Solicitar Acesso</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // ── TELA DE LOGIN (nome + PIN em box único) ──────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#f5f5f5",display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",padding:"32px 24px",fontFamily:"Inter,system-ui,sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{LOGIN_CSS}</style>{BG}

      <button onClick={()=>setPhase("lock")} style={{
        position:"absolute",top:24,left:20,background:"#ececec",border:"1px solid #ddd",borderRadius:20,
        color:"#888",padding:"6px 14px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,zIndex:10
      }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>

      {success ? (
        <div style={{textAlign:"center",animation:"successPop 0.5s ease both",zIndex:1}}>
          <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#059669,#10b981)",
            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",
            boxShadow:"0 0 0 12px rgba(5,150,105,0.15),0 0 50px rgba(16,185,129,0.4)"}}>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style={{color:"#1a1a1a",fontWeight:700,fontSize:17}}>Bem-vindo!</div>
          <div style={{color:"#888",fontSize:13,marginTop:5}}>Acessando o sistema...</div>
        </div>
      ) : (
        <div style={{width:"100%",maxWidth:360,zIndex:1,animation:"slideUp 0.35s ease both"}}>
          {/* Logo */}
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{width:72,height:72,borderRadius:20,background:"#fff",border:"2px solid rgba(139,50,48,0.12)",
              boxShadow:"0 4px 20px rgba(139,50,48,0.15)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",animation:"glowPulse 3s ease-in-out infinite"}}>
              <img src={LOGO_B64} style={{width:54,height:54,objectFit:"contain"}} alt="Logo"/>
            </div>
            <div style={{color:"#1a1a1a",fontWeight:700,fontSize:17}}>Bem-vindo</div>
            <div style={{color:"#888",fontSize:12,marginTop:3}}>Entre com suas credenciais</div>
          </div>

          {/* BOX de login */}
          <div style={{background:"#fff",borderRadius:16,padding:"20px 18px",boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"1px solid rgba(139,50,48,0.08)",marginBottom:10}}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.4}}>Nome</label>
              <input
                autoFocus
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,
                  outline:"none",background:"#f8fafc",color:"#1a1a1a",transition:"border 0.2s"}}
                value={loginNome}
                onChange={e=>{setLoginNome(e.target.value);setLoginErr("");}}
                onKeyDown={e=>e.key==="Enter"&&document.getElementById("pin-input")?.focus()}
                placeholder="Seu nome completo"
                onFocus={e=>e.target.style.borderColor="#8b3230"}
                onBlur={e=>e.target.style.borderColor="#e2e8f0"}
              />
            </div>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.4}}>PIN</label>
              <input
                id="pin-input"
                type="password"
                inputMode="numeric"
                maxLength={6}
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:18,
                  outline:"none",background:"#f8fafc",color:"#1a1a1a",letterSpacing:10,textAlign:"center",transition:"border 0.2s"}}
                value={loginPin}
                onChange={e=>{setLoginPin(e.target.value.replace(/\D/g,""));setLoginErr("");}}
                onKeyDown={e=>e.key==="Enter"&&tryLogin()}
                placeholder="• • • •"
                onFocus={e=>e.target.style.borderColor="#8b3230"}
                onBlur={e=>e.target.style.borderColor="#e2e8f0"}
              />
            </div>
            {loginErr && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"9px 12px",fontSize:12,color:"#dc2626",marginBottom:4}}>❌ {loginErr}</div>}
          </div>

          <button onClick={tryLogin} disabled={loginLoading} style={{
            width:"100%",padding:"15px",borderRadius:12,border:"none",
            background:"linear-gradient(135deg,#742a28,#5c1a18)",color:"#fff",fontSize:15,fontWeight:700,
            cursor:"pointer",boxShadow:"0 4px 20px rgba(116,42,40,0.4)",letterSpacing:0.3,marginBottom:14,
            opacity:loginLoading?0.7:1
          }}>
            {loginLoading
              ? <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
                  <span style={{width:14,height:14,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",animation:"spinLoader 0.7s linear infinite",display:"inline-block"}}/>
                  Verificando...
                </span>
              : "Entrar"
            }
          </button>

          {/* Link cadastro */}
          <div style={{textAlign:"center"}}>
            <button onClick={()=>{setPhase("cadastro");setLoginErr("");setCadStep(1);}} style={{
              background:"transparent",border:"none",color:"#742a28",fontSize:13,fontWeight:600,
              cursor:"pointer",textDecoration:"underline",padding:"4px 8px"
            }}>Primeiro acesso? Cadastre-se</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AccessLogView() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const data = await loadEncrypted("church_access_log");
        setLogs(data || []);
      } catch(e) {}
      setLoading(false);
    })();
  }, []);

  if (loading) return <Card><div style={{textAlign:"center",padding:20,color:"#94a3b8"}}>Carregando...</div></Card>;
  if (logs.length === 0) return <Card><div style={{textAlign:"center",padding:28,color:"#94a3b8"}}>Nenhum acesso registrado ainda.</div></Card>;

  return (
    <div>
      {logs.map(l => (
        <div key={l.id} style={{display:"flex",gap:10,padding:"9px 14px",background:"#fff",borderRadius:8,marginBottom:4,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",alignItems:"center"}}>

function EscalasEventos({eventos, setEventos, saveLS, showMsg, showToast}) {
  const [showForm, setShowForm] = useState(false);
  const [editEv, setEditEv] = useState(null);
  const [evForm, setEvForm] = useState({nome:"",data:"",hora:"",status:"Ativo"});
  function openNew(){setEvForm({nome:"",data:"",hora:"",status:"Ativo"});setEditEv(null);setShowForm(true);}
  function openEdit(ev){setEvForm({nome:ev.nome,data:ev.data,hora:ev.hora,status:ev.status});setEditEv(ev.id);setShowForm(true);}
  function saveEv(){
    if(!evForm.nome.trim()){showToast("Informe o nome","error");return;}
    let novo;
    if(editEv){novo=eventos.map(e=>e.id===editEv?{...e,...evForm}:e);}
    else{novo=[...eventos,{id:Date.now(),...evForm}];}
    setEventos(novo);saveLS("sec_eventos",novo);setShowForm(false);showMsg(editEv?"Evento atualizado!":"Evento criado!");
  }
  function toggleStatus(ev){
    const novo=eventos.map(e=>e.id===ev.id?{...e,status:e.status==="Ativo"?"Inativo":"Ativo"}:e);
    setEventos(novo);saveLS("sec_eventos",novo);
  }
  const ST2 = {
    inp:{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none"},
    btn:(bg="#8b3230")=>({background:bg,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer"}),
    del:{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"4px 8px",fontSize:13,cursor:"pointer",fontWeight:700}
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:700,fontSize:16,color:"#1e293b"}}>Gestão de Eventos</div>
        {isAdmin && <button style={{...ST2.btn(),display:"flex",alignItems:"center",gap:6}} onClick={openNew}>+ Novo Evento</button>}
      </div>
      {showForm && (
        <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>{editEv?"Editar":"Novo"} Evento</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 120px",gap:10,marginBottom:12}}>
            <div style={{gridColumn:"1 / span 4"}}>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:3}}>Nome do Evento</div>
              <input style={ST2.inp} placeholder="Ex: Culto Dominical" value={evForm.nome} onChange={e=>setEvForm(v=>({...v,nome:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:3}}>Data</div>
              <input type="date" style={ST2.inp} value={evForm.data} onChange={e=>setEvForm(v=>({...v,data:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:3}}>Hora</div>
              <input type="time" style={ST2.inp} value={evForm.hora} onChange={e=>setEvForm(v=>({...v,hora:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:3}}>Status</div>
              <select style={ST2.inp} value={evForm.status} onChange={e=>setEvForm(v=>({...v,status:e.target.value}))}>
                <option>Ativo</option><option>Inativo</option>
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={ST2.btn()} onClick={saveEv}>💾 Salvar</button>
            <button style={ST2.btn("#94a3b8")} onClick={()=>setShowForm(false)}>Cancelar</button>
          </div>
        </div>
      )}
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 110px 70px 90px 110px",gap:6,padding:"9px 14px",background:"#f8fafc",borderBottom:"2px solid #e2e8f0",fontSize:11,fontWeight:700,color:"#64748b"}}>
          <div>Evento</div><div>Data</div><div>Hora</div><div>Status</div><div>Ações</div>
        </div>
        {eventos.length===0
          ? <div style={{textAlign:"center",padding:30,color:"#94a3b8"}}>Nenhum evento cadastrado</div>
          : eventos.map((ev,i)=>(
          <div key={ev.id} style={{display:"grid",gridTemplateColumns:"1fr 110px 70px 90px 110px",gap:6,padding:"9px 14px",borderBottom:"1px solid #f1f5f9",alignItems:"center",background:i%2===0?"#fff":"#fafafa"}}>
            <span style={{fontWeight:600,fontSize:13}}>{ev.nome}</span>
            <span style={{fontSize:11,color:"#64748b"}}>{ev.data?new Date(ev.data+"T12:00").toLocaleDateString("pt-BR"):"-"}</span>
            <span style={{fontSize:11}}>{ev.hora||"-"}</span>
            <button onClick={()=>toggleStatus(ev)} style={{background:ev.status==="Ativo"?"#dcfce7":"#f1f5f9",color:ev.status==="Ativo"?"#16a34a":"#64748b",border:"none",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>⇄ {ev.status}</button>
            <div style={{display:"flex",gap:4}}>
              <button style={{background:"#dbeafe",color:"#1d4ed8",border:"none",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:700}} onClick={()=>openEdit(ev)}>✏️</button>
              <button style={ST2.del} onClick={()=>{const novo=eventos.filter(x=>x.id!==ev.id);setEventos(novo);saveLS("sec_eventos",novo);showMsg("Removido!");}}>🗑</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

                {evAtivos.map(ev=><option key={ev.id} value={ev.id}>{ev.nome}</option>)}

            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:3}}>Membro</div>

function EscalasMensal({eventos, grupos, showMsg}) {
  const hoje = new Date();
  const [mesAno, setMesAno] = useState({m:hoje.getMonth(), y:hoje.getFullYear()});
  const [grupoSel, setGrupoSel] = useState("");
  const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const ST2 = {inp:{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,outline:"none"}};
  function prevMes(){setMesAno(v=>{const d=new Date(v.y,v.m-1);return{m:d.getMonth(),y:d.getFullYear()};});}
  function nextMes(){setMesAno(v=>{const d=new Date(v.y,v.m+1);return{m:d.getMonth(),y:d.getFullYear()};});}
  const escalasDoMes = (()=>{
    try{const r=localStorage.getItem("sec_escalas_gest");const all=r?JSON.parse(r):[];
      return all.filter(e=>{if(!e.data)return false;const d=new Date(e.data+"T12:00");return d.getMonth()===mesAno.m&&d.getFullYear()===mesAno.y;});
    }catch(err){return[];}
  })();
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>📆 Escala Mensal</div>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>Grupo</div>
            <select style={ST2.inp} value={grupoSel} onChange={e=>setGrupoSel(e.target.value)}>
              <option value="">Selecione um grupo</option>
              {(grupos||[]).map((g,i)=><option key={i} value={g.nome}>{g.nome}</option>)}
              <option value="geral">Geral (todos)</option>
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>Mês/Ano</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={prevMes} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontWeight:700}}>‹</button>
              <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:14,padding:"7px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>{MESES[mesAno.m]}/{mesAno.y}</div>
              <button onClick={nextMes} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontWeight:700}}>›</button>
            </div>
          </div>
        </div>
      </div>
      {!grupoSel
        ? <div style={{background:"#fefce8",border:"1px solid #fde047",borderRadius:10,padding:24,textAlign:"center",color:"#854d0e",fontSize:13}}>ℹ️ Selecione um grupo e defina o Mês/Ano para carregar a matriz.</div>
        : escalasDoMes.length===0
          ? <div style={{background:"#fefce8",border:"1px solid #fde047",borderRadius:10,padding:24,textAlign:"center",color:"#854d0e",fontSize:13}}>Nenhuma escala para {MESES[mesAno.m]}/{mesAno.y}.</div>
          : <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
              <div style={{fontWeight:700,fontSize:14,padding:"12px 16px",borderBottom:"1px solid #f1f5f9"}}>{MESES[mesAno.m]}/{mesAno.y} — {escalasDoMes.length} escala(s)</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 100px",gap:6,padding:"8px 12px",background:"#f8fafc",fontSize:11,fontWeight:700,color:"#64748b"}}>
                <div>Membro</div><div>Evento</div><div>Função</div><div>Data</div>
              </div>
              {escalasDoMes.map((e,i)=>{
                const ev=eventos.find(x=>x.id===e.eventoId);
                return (
                  <div key={e.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 90px 100px",gap:6,padding:"8px 16px",borderBottom:"1px solid #f1f5f9",fontSize:13,background:i%2===0?"#fff":"#fafafa"}}>
                    <span style={{fontWeight:600}}>{e.membro}</span>
                    <span style={{color:"#64748b"}}>{ev?.nome||"-"}</span>
                    <span>{e.funcao||"-"}</span>
                    <span style={{color:"#64748b"}}>{e.data?new Date(e.data+"T12:00").toLocaleDateString("pt-BR"):"-"}</span>
                  </div>
                );
              })}
            </div>
      }
    </div>
  );
}

  function gerarDocumento(tipo) {
    const m = members.find(mb => mb.id === Number(certMembro));
    if (!m) { showToast("Selecione um membro","error"); return; }
    const igreja = config.nomeIgreja || "Assembleia de Deus - Diadema";
    const pastor = certPastor || config.pastor || "Pastor Responsavel";
    const dataDoc = certData ? new Date(certData).toLocaleDateString("pt-BR") : new Date().toLocaleDateString("pt-BR");
    const hoje = new Date().toLocaleDateString("pt-BR");
    let titulo="", corpo="";

      titulo="CERTIFICADO DE BATISMO";
      corpo=`<p style="text-align:center;font-size:18px;margin:20px 0">Certificamos que</p>
        <p style="text-align:center;font-size:26px;font-weight:bold">${m.nome}</p>
        <p style="text-align:center;font-size:16px;margin:16px 0">foi batizado(a) nas aguas em nome do Pai, do Filho e do Espirito Santo,<br/>conforme Mateus 28:19.</p>
        <p style="text-align:center">Data: <strong>${dataDoc}</strong></p>`;
    } else if(tipo==="membresia"){
      titulo="CARTA DE MEMBRESIA";
      corpo=`<p>Certificamos que o(a) irmao(a) <strong>${m.nome}</strong> e membro fiel desta igreja desde <strong>${dataDoc}</strong>, participando regularmente das atividades e cultos.</p>`;
    } else if(tipo==="recomendacao"){
      titulo="CARTA DE RECOMENDACAO";
      corpo=`<p>Recomendamos o(a) irmao(a) <strong>${m.nome}</strong> a todas as igrejas evangelicas. E nosso membro fiel, de boa conduta e carater cristao comprovado.</p>`;
    } else if(tipo==="nascimento"){
      titulo="CARTA DE NASCIMENTO ESPIRITUAL";
      corpo=`<p>Certificamos que o(a) irmao(a) <strong>${m.nome}</strong> aceitou a Jesus Cristo como seu Senhor e Salvador em <strong>${dataDoc}</strong>, nascendo de novo pelo Espirito Santo (Jo 3:3).</p>`;
    } else if(tipo==="mudanca"){
      titulo="CARTA DE MUDANCA";
      corpo=`<p>Comunicamos a transferencia do(a) membro <strong>${m.nome}</strong> desta congregacao, recomendando-o(a) a outra igreja de fe.</p>`;
    } else if(tipo==="convertido"){
      titulo="CARTA DE NOVO CONVERTIDO";
      corpo=`<p>Apresentamos o(a) novo(a) convertido(a) <strong>${m.nome}</strong>, que recentemente aceitou a Jesus Cristo e necessita de acolhimento e discipulado.</p>`;

    <div style="text-align:right;margin-top:30px;font-size:13px;color:#666">Diadema, ${hoje}</div>

function AdminView({currentUser, showToast, members, setMembers, save}) {
  const [sub, setSub] = useState("dashboard");
  const [admins, setAdmins] = useState([]);
  const [authData, setAuthData] = useState(null);
  const [saidas, setSaidas] = useState([]);
  const [audit, setAudit] = useState([]);
  const [modalAdmin, setModalAdmin] = useState(false);
  const [modalPin, setModalPin] = useState(false);
  const [formAdmin, setFormAdmin] = useState({nome:"",pin:""});
  const [newPin, setNewPin] = useState("");
  const [confPin, setConfPin] = useState("");
  const [modalPromover, setModalPromover] = useState(null); // {user} aguardando confirmação
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinConfirmErro, setPinConfirmErro] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const ra = await storageGet("church_auth");
        if (ra?.value) {
          const parsed = JSON.parse(ra.value);
          setAdmins(parsed.admins || []);
          setAuthData(parsed);
        }
        const rsL = localStorage.getItem("church_saidas"); const rs = rsL ? {value:rsL} : await window.storage.get("church_saidas").catch(()=>null);
        if (rs?.value) setSaidas(JSON.parse(rs.value));
        const rlL = localStorage.getItem("church_audit"); const rl = rlL ? {value:rlL} : await window.storage.get("church_audit").catch(()=>null);
        if (rl?.value) setAudit(JSON.parse(rl.value));
      } catch(e) {}
    })();
  }, []);

  async function saveAdmins(list) {
    try {
      const ra = await storageGet("church_auth");
      const d = ra?.value ? JSON.parse(ra.value) : {};
      await storageSet("church_auth", JSON.stringify({...d, admins:list}));
    } catch(e) {}
  }

  async function addAudit(acao, detalhe) {
    const entry = {id:Date.now(), acao, detalhe, admin:currentUser.nome, data:new Date().toLocaleString("pt-BR")};
    const updated = [entry, ...audit].slice(0, 100);
    setAudit(updated);
    try { localStorage.setItem("church_audit", JSON.stringify(updated)); } catch(e) {} try { await window.storage.set("church_audit", JSON.stringify(updated)); } catch(e) {}
  }

  async function criarAdmin() {
    if (!formAdmin.nome || formAdmin.pin.length < 4) { showToast("Nome e PIN minimo 4 digitos", "error"); return; }
    if (!/^\d+$/.test(formAdmin.pin)) { showToast("PIN so numeros", "error"); return; }
    const novo = {id:Date.now(), nome:formAdmin.nome, pin:hashPin(formAdmin.pin), nivel:"admin"};
    const updated = [...admins, novo];
    setAdmins(updated); await saveAdmins(updated);
    await addAudit("Novo admin criado", formAdmin.nome);
    showToast("Admin criado!"); setModalAdmin(false); setFormAdmin({nome:"",pin:""});
  }

  async function removerAdmin(id) {
    if (id === currentUser.id) { showToast("Nao pode remover a si mesmo","error"); return; }
    const updated = admins.filter(a => a.id !== id);
    setAdmins(updated); await saveAdmins(updated);
    await addAudit("Admin removido","id "+id);
    showToast("Removido","error");
  }

  async function alterarPin() {
    if (newPin.length < 4) { showToast("Minimo 4 digitos","error"); return; }
    if (!/^\d+$/.test(newPin)) { showToast("Apenas numeros","error"); return; }
    if (newPin !== confPin) { showToast("PINs nao coincidem","error"); return; }
    const updated = admins.map(a => a.id===currentUser.id ? {...a, pin:hashPin(newPin), pinTrocado:true} : a);
    setAdmins(updated);
    await saveAdmins(updated);
    currentUser.pinTrocado = true;
    await addAudit("PIN alterado", currentUser.nome);
    showToast("PIN alterado com sucesso!"); setModalPin(false); setNewPin(""); setConfPin("");
  }


  async function exportarDados() {
    try {
      const membersData = await loadEncrypted("church_members") || [];
      const criancasData = await loadEncrypted("church_criancas") || [];
      const exportObj = {
        versao: "1.0",
        exportadoEm: new Date().toISOString(),
        exportadoPor: currentUser.nome,
        totalMembros: membersData.length,
        totalCriancas: criancasData.length,
        membros: membersData,
        criancas: criancasData,
      };
      // Criptografar o export com senha derivada do PIN hash
      const json = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([json], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ad-diadema-backup-" + new Date().toISOString().slice(0,10) + ".json";
      a.click();
      URL.revokeObjectURL(url);
      await addAudit("Exportacao de dados", currentUser.nome + " - " + membersData.length + " membros");
      showToast("Backup exportado com sucesso!");
    } catch(e) {
      showToast("Erro ao exportar", "error");
    }
  }

  async function importarDados(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.membros) { showToast("Arquivo inválido","error"); return; }
      if (data.membros.length > 0) {
        await saveEncrypted("church_members", data.membros);
        setMembers(data.membros);
      }
      if (data.criancas?.length > 0) {
        await saveEncrypted("church_criancas", data.criancas);
      }
      await addAudit("Importacao de dados", data.membros.length + " membros importados");
      showToast(data.membros.length + " membros importados!");
    } catch(e) {
      showToast("Erro ao importar arquivo","error");
    }
  }

  async function aprovarSaida(id) {
    const sol = saidas.find(s => s.id===id);
    const updS = saidas.map(s => s.id===id ? {...s,status:"aprovado",por:currentUser.nome,em:hoje()} : s);
    const updM = members.map(m => m.id===sol.membroId ? {...m,ativo:false,historicoSaida:[...(m.historicoSaida||[]),{...sol,status:"aprovado",por:currentUser.nome}]} : m);
    setSaidas(updS); try { localStorage.setItem("church_saidas",JSON.stringify(updS)); } catch(e) {} try { await window.storage.set("church_saidas",JSON.stringify(updS)); } catch(e) {}
    setMembers(updM); await save(updM);
    await addAudit("Saida aprovada", sol.membroNome+" - "+sol.motivo);
    showToast("Saida aprovada e membro inativado");
  }

  async function rejeitarSaida(id) {
    const sol = saidas.find(s => s.id===id);
    const updated = saidas.map(s => s.id===id ? {...s,status:"rejeitado",por:currentUser.nome} : s);
    setSaidas(updated); try { localStorage.setItem("church_saidas",JSON.stringify(updated)); } catch(e) {} try { await window.storage.set("church_saidas",JSON.stringify(updated)); } catch(e) {}
    await addAudit("Saida rejeitada", sol.membroNome);
    showToast("Rejeitado","warn");
  }

  const pendentes = saidas.filter(s => s.status==="pendente");

  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:18,background:"#fff",borderRadius:12,padding:6,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flexWrap:"wrap"}}>
        {[{id:"dashboard",l:"Painel"},{id:"saidas",l:`Saidas${pendentes.length?" ("+pendentes.length+")":""}`},{id:"admins",l:`Admins${(authData?.users||[]).length > 0 ? " ("+authData.users.length+" 👥)" : ""}`},{id:"audit",l:"Auditoria"}].map(t => (
          <button key={t.id} onClick={async()=>{ setSub(t.id); if(t.id==="admins"){ const ra=await storageGet("church_auth"); if(ra?.value){const p=JSON.parse(ra.value); setAuthData(p); setAdmins(p.admins||[]);} } }} style={{padding:"7px 16px",border:"none",cursor:"pointer",fontWeight:600,fontSize:13,borderRadius:8,background:sub===t.id?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",color:sub===t.id?"#fff":"#64748b",transition:"all 0.2s"}}>
            {t.l}
          </button>
        ))}
      </div>

      {sub==="dashboard" && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
            {[{l:"Total",v:members.length,c:"#2563eb"},{l:"Ativos",v:members.filter(m=>m.ativo).length,c:"#059669"},{l:"Inativos",v:members.filter(m=>!m.ativo).length,c:"#64748b"},{l:"Saidas Pendentes",v:pendentes.length,c:"#dc2626"}].map(s => (
              <Card key={s.l} border={`3px solid ${s.c}33`}>
                <div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.v}</div>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginTop:2}}>{s.l}</div>
              </Card>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

function MembrosView({members, setMembers, save, showToast, currentUser, isAdmin}) {
  const [view, setView] = useState("list");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(EMPTY_MEMBER);
  const [search, setSearch] = useState("");
  const [fCargo, setFCargo] = useState("");
  const [fMin, setFMin] = useState("");
  const [fAtivo, setFAtivo] = useState("ativos");
  const [delConfirm, setDelConfirm] = useState(null);
  const [saidaModal, setSaidaModal] = useState(null);
  const [saidaForm, setSaidaForm] = useState({motivo:"",obs:""});
  const [tab, setTab] = useState("pessoal");
  const hf = (k,v) => setForm(f => ({...f,[k]:v}));

  const filtered = members.filter(m => {
    const q = search.toLowerCase();
    return (!search||m.nome.toLowerCase().includes(q)||m.cpf?.includes(q)||m.telefone?.includes(q)||m.email?.toLowerCase().includes(q))
      && (!fCargo||m.cargo===fCargo) && (!fMin||m.ministerio===fMin)
      && (fAtivo==="todos"||(fAtivo==="ativos"?m.ativo:!m.ativo));
  });

  function openNew() { setForm({...EMPTY_MEMBER,id:Date.now()}); setEditing(null); setTab("pessoal"); setView("form"); }
  function openEdit(m) { setForm({...m}); setEditing(m.id); setTab("pessoal"); setView("form"); }
  function openDetail(m) { setEditing(m); setView("detail"); }

  async function handleSave() {
    if (!form.nome.trim()) { showToast("Nome obrigatorio","error"); return; }
    const updated = editing ? members.map(m=>m.id===editing?form:m) : [...members,form];
    setMembers(updated); await save(updated);
    showToast(editing?"Atualizado!":"Cadastrado!"); setView("list");
  }

  async function handleDelete(id) {
    const updated = members.filter(m => m.id!==id);
    setMembers(updated); await save(updated);
    showToast("Removido","error"); setDelConfirm(null); setView("list");
  }

  async function enviarSaida() {
    if (!saidaForm.motivo) { showToast("Selecione motivo","error"); return; }
    const nova = {id:Date.now(),membroId:saidaModal.id,membroNome:saidaModal.nome,motivo:saidaForm.motivo,obs:saidaForm.obs,status:"pendente",por:currentUser.nome,em:hoje()};
    try {
      const rL2 = localStorage.getItem("church_saidas"); const r = rL2 ? {value:rL2} : await window.storage.get("church_saidas").catch(()=>null);
      const lista = r?.value ? JSON.parse(r.value) : [];
      const novaLista=[...lista,nova]; localStorage.setItem("church_saidas",JSON.stringify(novaLista)); await window.storage.set("church_saidas", JSON.stringify(novaLista));
      showToast("Solicitacao enviada para aprovacao","warn");
    } catch(e) { showToast("Erro","error"); }
    setSaidaModal(null); setSaidaForm({motivo:"",obs:""});
  }

  function exportCSV() {
    const f = ["nome","cpf","nascimento","sexo","estadoCivil","telefone","email","endereco","cidade","cep","cargo","ministerio","dataBatismo","dataMembresia","conjugeNome","filhos","ativo","observacoes"];
    const h = ["Nome","CPF","Nascimento","Sexo","Est.Civil","Telefone","Email","Endereco","Cidade","CEP","Cargo","Ministerio","Batismo","Membresia","Conjuge","Filhos","Ativo","Obs"];

    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download="membros.csv"; a.click(); URL.revokeObjectURL(url);

  if (view==="detail" && editing) {

            </div>
          </>}

            <div style={{gridColumn:"1/-1"}}><Field label="Observacoes"><textarea style={{...INP,minHeight:64,resize:"vertical"}} value={form.observacoes} onChange={e=>hf("observacoes",e.target.value)} /></Field></div>

  return (

        {[{l:"Total",v:members.length,c:"#2563eb"},{l:"Ativos",v:members.filter(m=>m.ativo).length,c:"#059669"},{l:"Inativos",v:members.filter(m=>!m.ativo).length,c:"#64748b"},{l:"Aniversariantes",v:anivMes(members).length,c:"#d97706"}].map(s=>(
          <Card key={s.l} border={`3px solid ${s.c}33`}>
            <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>

      <Card pad={0}>
        <div style={{padding:"12px 14px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",borderBottom:"1px solid #f1f5f9"}}>

          <select style={{...SEL,width:"auto"}} value={fCargo} onChange={e=>setFCargo(e.target.value)}><option value="">Cargos</option>{CARGOS.map(c=><option key={c}>{c}</option>)}</select>

// ── RELATORIO ──────────────────────────────────────────────────────────────────
function RelatorioView({members}) {
  const [periodo, setPeriodo] = useState("semanal");
  const [mes, setMes] = useState(new Date().getMonth());
  const lista = periodo==="semanal" ? anivSemana(members) : anivMes(members,mes);
  const {ini,fim} = semanaAtual();

  function gerarPDF() {
    const titulo = periodo==="semanal"
      ? "Aniversariantes da Semana ("+ini.toLocaleDateString("pt-BR")+" - "+fim.toLocaleDateString("pt-BR")+")"
      : "Aniversariantes de "+MESES_PT[mes];
    if (window.jspdf) { buildPDF(titulo); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = () => buildPDF(titulo);
    document.head.appendChild(s);
  }

  function buildPDF(titulo) {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    const W = doc.internal.pageSize.getWidth();
    doc.setFillColor(30,58,95); doc.rect(0,0,W,34,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(15); doc.setFont("helvetica","bold");
    doc.text("Igreja - Relatorio de Aniversariantes", W/2, 13, {align:"center"});
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text(titulo, W/2, 24, {align:"center"});
    doc.setTextColor(30,41,59);
    let y = 46;
    if (!lista.length) {
      doc.setFontSize(12); doc.text("Nenhum aniversariante neste periodo.", W/2, y, {align:"center"});
    } else {
      doc.setFillColor(241,245,249); doc.rect(14,y-6,W-28,10,"F");
      doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(100,116,139);
      doc.text("NOME",16,y); doc.text("DATA",90,y); doc.text("CARGO",112,y); doc.text("MINISTERIO",150,y); doc.text("TELEFONE",186,y);
      y+=7; doc.setFont("helvetica","normal"); doc.setTextColor(30,41,59); doc.setFontSize(10);
      [...lista].sort((a,b)=>new Date(a.nascimento+"T00:00").getDate()-new Date(b.nascimento+"T00:00").getDate()).forEach((m,i)=>{
        if (y>272) { doc.addPage(); y=20; }
        if (i%2===0) { doc.setFillColor(248,250,252); doc.rect(14,y-5,W-28,10,"F"); }
        if (isAniv(m.nascimento)) doc.setTextColor(217,119,6); else doc.setTextColor(30,41,59);
        doc.text(m.nome.slice(0,30)+(isAniv(m.nascimento)?" *":""),16,y);
        doc.setTextColor(30,41,59);
        const dia = new Date(m.nascimento+"T00:00");
        doc.text(String(dia.getDate()).padStart(2,"0")+"/"+String(dia.getMonth()+1).padStart(2,"0"),90,y);
        doc.text(m.cargo.slice(0,16),112,y);
        doc.text((m.ministerio!=="Nenhum"?m.ministerio:"--").slice(0,14),150,y);
        doc.text(m.telefone||"--",186,y);
        y+=9;
      });
    }
    doc.setFontSize(8); doc.setTextColor(148,163,184);
    doc.text("Gerado em "+new Date().toLocaleDateString("pt-BR")+" - Total: "+lista.length, W/2, 286, {align:"center"});
    doc.save("aniversariantes_"+periodo+".pdf");
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontWeight:700,fontSize:16}}>Relatorio de Aniversariantes</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",background:"#f1f5f9",borderRadius:8,overflow:"hidden"}}>
            {["semanal","mensal"].map(p=><button key={p} onClick={()=>setPeriodo(p)} style={{padding:"6px 14px",border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:periodo===p?"#2563eb":"transparent",color:periodo===p?"#fff":"#64748b"}}>{p==="semanal"?"Semanal":"Mensal"}</button>)}
          </div>
          {periodo==="mensal" && <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{...SEL,width:"auto"}}>{MESES_PT.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>}
          <Btn color="blue" size="sm" onClick={gerarPDF}>Gerar PDF</Btn>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
        {[{l:"Total",v:lista.length,c:"#2563eb"},{l:"Hoje",v:lista.filter(m=>isAniv(m.nascimento)).length,c:"#d97706"},{l:"Com WhatsApp",v:lista.filter(m=>m.telefone).length,c:"#25d366"}].map(s=>(
          <Card key={s.l} border={`3px solid ${s.c}33`}>
            <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginTop:2}}>{s.l}</div>
          </Card>
        ))}
      </div>
      {periodo==="semanal" && <div style={{padding:"9px 14px",background:"#eff6ff",borderRadius:10,border:"1px solid #bfdbfe",marginBottom:12,fontSize:13,color:"#1d4ed8",fontWeight:500}}>{ini.toLocaleDateString("pt-BR")} ate {fim.toLocaleDateString("pt-BR")}</div>}
      <Card pad={0}>
        {lista.length===0
          ? <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><div style={{fontSize:36,marginBottom:8}}>🎂</div><div style={{fontWeight:600}}>Nenhum aniversariante</div></div>
          : [...lista].sort((a,b)=>new Date(a.nascimento+"T00:00").getDate()-new Date(b.nascimento+"T00:00").getDate()).map(m=>{
              const dia = new Date(m.nascimento+"T00:00").getDate();
              const h = isAniv(m.nascimento);
              return (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 14px",borderBottom:"1px solid #f8fafc",background:h?"#fffbeb":"#fff"}}>
