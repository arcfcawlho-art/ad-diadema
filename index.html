
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADD Diadema - Gestão de Membros</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Assembleia de Deus de Diadema</h1>
</header>

<nav>
<button onclick="ui.show('membros')">Membros</button>
<button onclick="ui.show('criancas')">Crianças</button>
<button onclick="ui.show('eventos')">Eventos</button>
<button id="adminBtn" onclick="ui.show('admin')" style="display:none;">Admin</button>
</nav>

<main>

<section id="login">
<h2>Login</h2>
<input id="loginNome" placeholder="Nome">
<input id="loginPin" placeholder="PIN" type="password">
<button onclick="usuarios.login()">Entrar</button>
</section>

<section id="membros" class="hidden">
<h2>Membros</h2>

<div class="form">
<input id="nome" placeholder="Nome">
<input id="cargo" placeholder="Cargo">
<input id="congregacao" placeholder="Congregação">
<input id="endereco" placeholder="Endereço">
<input id="whatsapp" placeholder="WhatsApp">
<input id="familia" placeholder="Família / ID Familiar">
<input type="file" id="foto">
<button onclick="usuarios.salvar()">Salvar</button>
</div>

<ul id="listaMembros"></ul>
</section>

<section id="criancas" class="hidden">
<h2>Crianças</h2>

<div class="form">
<input id="nomeCrianca" placeholder="Nome">
<input id="responsavelCrianca" placeholder="Responsável">
<input id="congregacaoCrianca" placeholder="Congregação">
<input type="file" id="fotoCrianca">
<button onclick="criancas.salvar()">Salvar</button>
</div>

<ul id="listaCriancas"></ul>
</section>

<section id="eventos" class="hidden">
<h2>Eventos</h2>

<div class="form">
<input id="tituloEvento" placeholder="Título">
<input id="dataEvento" type="date">
<textarea id="descEvento" placeholder="Descrição"></textarea>
<button onclick="eventos.salvar()">Salvar Evento</button>
</div>

<ul id="listaEventos"></ul>
</section>

<section id="admin" class="hidden">
<h2>Administração</h2>

<button onclick="admin.exportar()">Exportar Backup</button>
<button onclick="admin.importar()">Importar Backup</button>

<h3>Promover Usuário</h3>
<input id="adminNome">
<button onclick="admin.promover()">Promover</button>

</section>

</main>

<script src="storage.js"></script>
<script src="usuarios.js"></script>
<script src="criancas.js"></script>
<script src="eventos.js"></script>
<script src="admin.js"></script>
<script src="app.js"></script>

</body>
</html>
