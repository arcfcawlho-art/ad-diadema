// ── CONSERVA ───────────────────────────────────────────────────────────────────
function ConservaView({members, showToast}) {
  const [escalas, setEscalas] = useState([]);
  const [modal, setModal] = useState(false);
  const [hist, setHist] = useState(false);
  const [form, setForm] = useState({id:null,semana:"",equipe:"",responsavel:"",membrosIds:[],obs:""});

  useEffect(()=>{(async()=>{try{const r=await window.storage.get("church_escalas");if(r?.value)setEscalas(JSON.parse(r.value));}catch(e){}})();},[]);
  const saveE = async l => { try{await window.storage.set("church_escalas",JSON.stringify(l));}catch(e){} };
  const semLabel = d => { const dt=new Date(d+"T00:00"); const f=new Date(dt); f.setDate(dt.getDate()+6); return dt.toLocaleDateString("pt-BR")+" - "+f.toLocaleDateString("pt-BR"); };

  async function salvar() {
    if (!form.semana||!form.equipe) { showToast("Semana e equipe obrigatorios","error"); return; }
    const u = form.id ? escalas.map(e=>e.id===form.id?form:e) : [...escalas,{...form,id:Date.now()}];
    setEscalas(u); await saveE(u); showToast("Escala salva!"); setModal(false);
  }

  async function excluir(id) { const u=escalas.filter(e=>e.id!==id); setEscalas(u); await saveE(u); showToast("Removida","error"); }

  function notif(e) {
    const ms = members.filter(m=>e.membrosIds?.includes(m.id)&&m.telefone);
    if (!ms.length) { showToast("Nenhum membro com telefone","error"); return; }
    ms.forEach((m,i)=>setTimeout(()=>{
      const msg = encodeURIComponent("Ola, "+m.nome.split(" ")[0]+"!\n\nEscala de Conserva:\nSemana: "+semLabel(e.semana)+"\nEquipe: "+e.equipe+"\n\n"+(e.obs||"Contamos com voce!")+"\n\nServindo com alegria!");
      window.open("https://wa.me/55"+rawTel(m.telefone)+"?text="+msg,"_blank");
    },i*600));
    showToast("Notificando "+ms.length+" membro(s)");
  }

  const agora = new Date();
  const prox = escalas.filter(e=>new Date(e.semana+"T00:00")>=agora).sort((a,b)=>a.semana.localeCompare(b.semana));
  const histList = escalas.filter(e=>new Date(e.semana+"T00:00")<agora).sort((a,b)=>b.semana.localeCompare(a.semana));

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontWeight:700,fontSize:16}}>Escala de Conserva / Obreiros</div>
        <div style={{display:"flex",gap:8}}>
          <Btn color="gray" size="sm" onClick={()=>setHist(!hist)}>{hist?"Ver Proximas":"Historico"}</Btn>
          <Btn color="blue" size="sm" onClick={()=>{setForm({id:null,semana:"",equipe:"",responsavel:"",membrosIds:[],obs:""});setModal(true);}}>+ Nova Escala</Btn>
        </div>
      </div>
      {!hist && (prox.length===0
        ? <Card><div style={{textAlign:"center",padding:36,color:"#94a3b8"}}><div style={{fontWeight:600}}>Nenhuma escala cadastrada</div></div></Card>
        : prox.map(e=>{const ms=members.filter(m=>e.membrosIds?.includes(m.id)); return(
          <Card key={e.id} gap={10}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div><div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{e.equipe}</div><div style={{fontSize:13,color:"#64748b"}}>{semLabel(e.semana)}</div>{e.responsavel&&<div style={{fontSize:12,color:"#64748b"}}>Responsavel: {e.responsavel}</div>}</div>
              <div style={{display:"flex",gap:6}}><Btn color="green" size="sm" onClick={()=>notif(e)}>WA Notif.</Btn>{isAdmin && <Btn color="gray" size="sm" onClick={()=>{setForm({...e});setModal(true);}}>Editar</Btn>}{isAdmin && <Btn color="red" size="sm" onClick={()=>excluir(e.id)}>Remover</Btn>}</div>
            </div>
            {ms.length>0&&<div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>{ms.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:5,background:"#f8fafc",borderRadius:6,padding:"3px 8px"}}><Avatar nome={m.nome} foto={m.foto} size={22}/><span style={{fontSize:11,fontWeight:500}}>{m.nome.split(" ")[0]}</span></div>)}</div>}
            {e.obs&&<div style={{marginTop:8,padding:"6px 10px",background:"#fffbeb",borderRadius:6,fontSize:12,color:"#92400e",borderLeft:"3px solid #fbbf24"}}>{e.obs}</div>}
          </Card>
        );})
      )}
      {hist && (histList.length===0
        ? <Card><div style={{textAlign:"center",padding:28,color:"#94a3b8"}}>Sem historico.</div></Card>
        : histList.map(e=><Card key={e.id} gap={8}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontWeight:600,fontSize:13}}>{e.equipe}</div><div style={{fontSize:11,color:"#94a3b8"}}>{semLabel(e.semana)}</div></div><span style={{background:"#f1f5f9",color:"#64748b",borderRadius:8,padding:"2px 10px",fontSize:11,fontWeight:600}}>Concluida</span></div></Card>)
      )}
      {modal && <Modal onClose={()=>setModal(false)} width={480}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{form.id?"Editar":"Nova"} Escala</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="Semana (inicio - domingo)"><input type="date" style={INP} value={form.semana} onChange={e=>setForm(f=>({...f,semana:e.target.value}))} /></Field>
          <Field label="Equipe"><input style={INP} value={form.equipe} onChange={e=>setForm(f=>({...f,equipe:e.target.value}))} placeholder="Ex: Equipe A" /></Field>
          <Field label="Responsavel"><input style={INP} value={form.responsavel} onChange={e=>setForm(f=>({...f,responsavel:e.target.value}))} /></Field>
          <Field label="Membros Escalados">
            <div style={{maxHeight:170,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:8}}>
              {members.filter(m=>m.ativo&&m.telefone).map(m=>(
                <label key={m.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 11px",borderBottom:"1px solid #f8fafc",cursor:"pointer"}}>
                  <input type="checkbox" checked={form.membrosIds?.includes(m.id)||false} onChange={e=>setForm(f=>({...f,membrosIds:e.target.checked?[...(f.membrosIds||[]),m.id]:(f.membrosIds||[]).filter(id=>id!==m.id)}))} style={{accentColor:"#2563eb",width:14,height:14}} />
                  <Avatar nome={m.nome} foto={m.foto} size={24} />
                  <div><div style={{fontWeight:600,fontSize:12}}>{m.nome}</div><div style={{fontSize:10,color:"#94a3b8"}}>{m.cargo}</div></div>
                </label>
              ))}
            </div>
          </Field>
          <Field label="Observacoes"><textarea style={{...INP,minHeight:60,resize:"vertical"}} value={form.obs} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} /></Field>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><Btn color="gray" onClick={()=>setModal(false)}>Cancelar</Btn><Btn color="blue" onClick={salvar}>Salvar</Btn></div>
      </Modal>}
    </div>
  );
}

// ── AGENDA ─────────────────────────────────────────────────────────────────────
function AgendaView({members, showToast, isAdmin}) {
  const [eventos, setEventos] = useState([]);
  const [mes, setMes] = useState(new Date().getMonth());
  const [ano, setAno] = useState(new Date().getFullYear());
  const [modal, setModal] = useState(false);
  const [fMin, setFMin] = useState("");
  const [form, setForm] = useState({id:null,titulo:"",data:"",hora:"",local:"",ministerio:"",descricao:"",cor:"#2563eb"});

  useEffect(()=>{(async()=>{try{const r=await window.storage.get("church_eventos");if(r?.value)setEventos(JSON.parse(r.value));}catch(e){}})();},[]);
  const saveEv = async l => { try{await window.storage.set("church_eventos",JSON.stringify(l));}catch(e){} };

  const evMes = eventos.filter(e=>{const d=new Date(e.data+"T00:00");return d.getMonth()===mes&&d.getFullYear()===ano&&(!fMin||e.ministerio===fMin);}).sort((a,b)=>a.data.localeCompare(b.data));

  async function salvar() {
    if (!form.titulo||!form.data) { showToast("Titulo e data obrigatorios","error"); return; }
    const u = form.id ? eventos.map(e=>e.id===form.id?form:e) : [...eventos,{...form,id:Date.now()}];
    setEventos(u); await saveEv(u); showToast("Evento salvo!"); setModal(false);
  }
  async function excluir(id) { const u=eventos.filter(e=>e.id!==id); setEventos(u); await saveEv(u); showToast("Removido","error"); }

  function notifEv(ev) {
    const dest = members.filter(m=>m.ativo&&m.telefone&&(!ev.ministerio||m.ministerio===ev.ministerio));
    if (!dest.length) { showToast("Nenhum membro","error"); return; }
    dest.forEach((m,i)=>setTimeout(()=>{
      const msg = encodeURIComponent("Ola, "+m.nome.split(" ")[0]+"!\n\n"+ev.titulo+"\n\nData: "+ptDate(ev.data)+(ev.hora?" Horario: "+ev.hora:"")+(ev.local?"\nLocal: "+ev.local:"")+"\n\n"+(ev.descricao||"")+"\n\nDeus abencoe!");
      window.open("https://wa.me/55"+rawTel(m.telefone)+"?text="+msg,"_blank");
    },i*600));
    showToast("Notificando "+dest.length+" membro(s)");
  }

  const prim = new Date(ano,mes,1).getDay();
  const dias = new Date(ano,mes+1,0).getDate();
  const cels = Array(prim).fill(null).concat(Array.from({length:dias},(_,i)=>i+1));
  while(cels.length%7!==0) cels.push(null);

  function evsDia(dia) {
    if (!dia) return [];
    const ds = ano+"-"+String(mes+1).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
    return eventos.filter(e=>e.data===ds&&(!fMin||e.ministerio===fMin));
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontWeight:700,fontSize:16}}>Agenda de Atividades</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <select style={{...SEL,width:"auto"}} value={fMin} onChange={e=>setFMin(e.target.value)}><option value="">Todos ministerios</option>{MINISTERIOS.filter(m=>m!=="Nenhum").map(m=><option key={m}>{m}</option>)}</select>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <Btn color="ghost" size="sm" onClick={()=>{if(mes===0){setMes(11);setAno(a=>a-1);}else setMes(m=>m-1);}}>‹</Btn>
            <span style={{fontWeight:700,fontSize:13,minWidth:120,textAlign:"center"}}>{MESES_PT[mes]} {ano}</span>
            <Btn color="ghost" size="sm" onClick={()=>{if(mes===11){setMes(0);setAno(a=>a+1);}else setMes(m=>m+1);}}>›</Btn>
          </div>
          {isAdmin && <Btn color="blue" size="sm" onClick={()=>{setForm({id:null,titulo:"",data:ano+"-"+String(mes+1).padStart(2,"0")+"-01",hora:"",local:"",ministerio:"",descricao:"",cor:"#2563eb"});setModal(true);}}>+ Evento</Btn>}
        </div>
      </div>
      <Card gap={14}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {DIAS_SEMANA.map(d=><div key={d} style={{textAlign:"center",fontWeight:700,fontSize:10,color:"#94a3b8",padding:"4px 0",textTransform:"uppercase"}}>{d}</div>)}
          {cels.map((dia,i)=>{
            const evs = evsDia(dia);
            const isHoje = dia && new Date().getDate()===dia && new Date().getMonth()===mes && new Date().getFullYear()===ano;
            return (
              <div key={i} onClick={()=>{if(!dia||!isAdmin)return;setForm({id:null,titulo:"",data:ano+"-"+String(mes+1).padStart(2,"0")+"-"+String(dia).padStart(2,"0"),hora:"",local:"",ministerio:"",descricao:"",cor:"#2563eb"});setModal(true);}} style={{minHeight:58,borderRadius:6,padding:3,background:!dia?"transparent":isHoje?"#eff6ff":"#f8fafc",border:isHoje?"2px solid #2563eb":"2px solid transparent",cursor:dia?"pointer":"default"}}>
                {dia && <>
                  <div style={{fontWeight:isHoje?800:500,fontSize:12,color:isHoje?"#2563eb":"#374151",marginBottom:1}}>{dia}</div>
                  {evs.slice(0,2).map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();setForm({...ev});setModal(true);}} style={{background:ev.cor||"#2563eb",color:"#fff",borderRadius:3,fontSize:8,fontWeight:600,padding:"1px 3px",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{ev.titulo}</div>)}
                  {evs.length>2 && <div style={{fontSize:8,color:"#64748b"}}>+{evs.length-2}</div>}
                </>}
              </div>
            );
          })}
        </div>
      </Card>
      <div style={{fontWeight:700,fontSize:12,color:"#64748b",marginBottom:10}}>{MESES_PT[mes]} ({evMes.length} evento{evMes.length!==1?"s":""})</div>
      {evMes.length===0
        ? <Card><div style={{textAlign:"center",padding:24,color:"#94a3b8",fontSize:13}}>Nenhum evento. Clique em um dia ou em "+ Evento".</div></Card>
        : evMes.map(ev=>(
          <Card key={ev.id} gap={8}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{width:4,borderRadius:4,background:ev.cor||"#2563eb",alignSelf:"stretch",flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{ev.titulo}</div>
                    <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{ptDate(ev.data)}{ev.hora&&" - "+ev.hora}{ev.local&&" - "+ev.local}</div>
                    {ev.ministerio&&<span style={{background:"#eff6ff",color:"#2563eb",borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:600,marginTop:2,display:"inline-block"}}>{ev.ministerio}</span>}
                    {ev.descricao&&<div style={{fontSize:12,color:"#64748b",marginTop:3}}>{ev.descricao}</div>}
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <Btn color="green" size="sm" onClick={()=>notifEv(ev)}>WA</Btn>
                    <Btn color="gray" size="sm" onClick={()=>{setForm({...ev});setModal(true);}}>Editar</Btn>
                    <Btn color="red" size="sm" onClick={()=>excluir(ev.id)}>Remover</Btn>
                  </div>
                </div>
              </div>
            </div>
          </Card>
        ))
      }
      {modal && <Modal onClose={()=>setModal(false)} width={440}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{form.id?"Editar":"Novo"} Evento</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="Titulo *"><input style={INP} value={form.titulo} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))} /></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Data *"><input type="date" style={INP} value={form.data} onChange={e=>setForm(f=>({...f,data:e.target.value}))} /></Field>
            <Field label="Horario"><input type="time" style={INP} value={form.hora} onChange={e=>setForm(f=>({...f,hora:e.target.value}))} /></Field>
          </div>
          <Field label="Local"><input style={INP} value={form.local} onChange={e=>setForm(f=>({...f,local:e.target.value}))} /></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,alignItems:"end"}}>
            <Field label="Ministerio"><select style={SEL} value={form.ministerio} onChange={e=>setForm(f=>({...f,ministerio:e.target.value}))}><option value="">Toda a Igreja</option>{MINISTERIOS.filter(m=>m!=="Nenhum").map(m=><option key={m}>{m}</option>)}</select></Field>
            <div><div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Cor</div><div style={{display:"flex",gap:4}}>{CORES.map(c=><div key={c} onClick={()=>setForm(f=>({...f,cor:c}))} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",border:form.cor===c?"3px solid #1e293b":"3px solid transparent"}} />)}</div></div>
          </div>
          <Field label="Descricao"><textarea style={{...INP,minHeight:58,resize:"vertical"}} value={form.descricao} onChange={e=>setForm(f=>({...f,descricao:e.target.value}))} /></Field>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          {form.id && <Btn color="red" onClick={()=>{excluir(form.id);setModal(false);}}>Remover</Btn>}
          <Btn color="gray" onClick={()=>setModal(false)}>Cancelar</Btn>
          <Btn color="blue" onClick={salvar}>Salvar</Btn>
        </div>
      </Modal>}
    </div>
  );
}

  const meses = ["janeiro","fevereiro","marco","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

  function getDest() {
    if (tipoD==="todos_ativos") return members.filter(m=>m.ativo&&m.telefone);
    if (tipoD==="aniversariantes") return anivMes(members).filter(m=>m.telefone);
    if (tipoD==="ministerio") return members.filter(m=>m.ativo&&m.ministerio===fMin&&m.telefone);

          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Para quem enviar?</div>
          <Card gap={14}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {[{id:"todos_ativos",l:"Todos ativos",c:members.filter(m=>m.ativo&&m.telefone).length},{id:"aniversariantes",l:"Aniversariantes de "+meses[new Date().getMonth()],c:anivMes(members).filter(m=>m.telefone).length},{id:"ministerio",l:"Por Ministerio",c:null},{id:"cargo",l:"Por Cargo",c:null},{id:"manual",l:"Selecionar",c:null}].map(op=>(
                <div key={op.id} onClick={()=>setTipoD(op.id)} style={{padding:10,borderRadius:8,border:"2px solid",borderColor:tipoD===op.id?"#25d366":"#e2e8f0",cursor:"pointer",background:tipoD===op.id?"#f0fdf4":"#fff"}}>
                  <div style={{fontWeight:600,fontSize:12}}>{op.l}</div>
                  {op.c!==null && <div style={{fontSize:10,color:"#25d366",fontWeight:700,marginTop:1}}>{op.c} com tel.</div>}
                </div>
              ))}
            </div>
            {tipoD==="ministerio" && <div style={{marginBottom:10}}><select style={SEL} value={fMin} onChange={e=>setFMin(e.target.value)}><option value="">Selecione...</option>{MINISTERIOS.filter(m=>m!=="Nenhum").map(m=><option key={m}>{m}</option>)}</select></div>}
            {tipoD==="cargo" && <div style={{marginBottom:10}}><select style={SEL} value={fCarg} onChange={e=>setFCarg(e.target.value)}><option value="">Selecione...</option>{CARGOS.map(c=><option key={c}>{c}</option>)}</select></div>}
            {tipoD==="manual" && <div style={{maxHeight:160,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:10}}>{members.filter(m=>m.telefone).map(m=><label key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #f8fafc",cursor:"pointer"}}><input type="checkbox" checked={selIds.includes(m.id)} onChange={e=>setSelIds(p=>e.target.checked?[...p,m.id]:p.filter(id=>id!==m.id))} style={{accentColor:"#25d366",width:14,height:14}} /><Avatar nome={m.nome} foto={m.foto} size={26} /><div><div style={{fontWeight:600,fontSize:12}}>{m.nome}</div><div style={{fontSize:10,color:"#94a3b8"}}>{m.telefone}</div></div></label>)}</div>}
            <div style={{padding:10,background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0",fontSize:13,fontWeight:600,color:"#166534"}}>{dest.length} destinatario{dest.length!==1?"s":""} selecionado{dest.length!==1?"s":""}</div>
          </Card>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <Btn color="gray" onClick={()=>setStep("template")}>Voltar</Btn>
            <Btn color="green" disabled={!dest.length} onClick={()=>setStep("personalizar")}>Personalizar</Btn>
          </div>
        </div>
      )}

      {step==="personalizar" && selT && (
        <div>
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Personalize a mensagem</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Card>
              <div style={{fontWeight:700,fontSize:12,color:"#64748b",marginBottom:12,textTransform:"uppercase"}}>Variaveis</div>
              {selT.id==="aniversario"
                ? <div style={{padding:12,background:"#f0fdf4",borderRadius:8,color:"#166534",fontSize:13}}>Mensagem automatica! Sera personalizada com o nome de cada membro.</div>
                : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {[["titulo_evento","Titulo do Evento",""],["data","Data","Ex: Domingo 09/03"],["horario","Horario","Ex: 19h"],["local","Local","Ex: Templo Central"]].map(([k,l,ph])=>selT.texto.includes("{"+k+"}")&&<Field key={k} label={l}><input style={INP} value={vars[k]||""} onChange={e=>setVars(v=>({...v,[k]:e.target.value}))} placeholder={ph} /></Field>)}
                    <Field label="Mensagem adicional"><textarea style={{...INP,minHeight:60,resize:"vertical"}} value={vars.mensagem} onChange={e=>setVars(v=>({...v,mensagem:e.target.value}))} /></Field>
                  </div>
              }
            </Card>
            <Card>
              <div style={{fontWeight:700,fontSize:12,color:"#64748b",marginBottom:12,textTransform:"uppercase"}}>Previa</div>
              <div style={{background:"#e5ddd5",borderRadius:10,padding:10,minHeight:140}}>
                <div style={{background:"#dcf8c6",borderRadius:"10px 10px 2px 10px",padding:"9px 12px",fontSize:11,lineHeight:1.7,whiteSpace:"pre-line",maxWidth:"90%",marginLeft:"auto",boxShadow:"0 1px 2px rgba(0,0,0,0.1)"}}>
                  {dest[0] ? buildMsg(selT,{nome:dest[0].nome,ministerio:dest[0].ministerio||"Louvor"},vars) : "Selecione destinatarios primeiro"}
                </div>
              </div>
            </Card>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
            <Btn color="gray" onClick={()=>setStep("destinatarios")}>Voltar</Btn>
            <Btn color="green" onClick={()=>{setEnviados(dest);setStep("enviar");}}>Ir para Envio</Btn>
          </div>
        </div>
      )}

      {step==="enviar" && (
        <div>
          <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Enviar mensagens</div>
          <Card gap={14}>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:12,background:"#f0fdf4",borderRadius:10,marginBottom:12,border:"1px solid #bbf7d0",flexWrap:"wrap"}}>
              <div style={{flex:1}}><div style={{fontWeight:700,color:"#166534"}}>Pronto para enviar!</div><div style={{fontSize:12,color:"#16a34a"}}>{enviados.length} mensagen{enviados.length!==1?"s":"m"} - {selT?.titulo}</div></div>
              <Btn color="green" onClick={()=>enviados.forEach((m,i)=>setTimeout(()=>{window.open("https://wa.me/55"+rawTel(m.telefone)+"?text="+encodeURIComponent(buildMsg(selT,m,vars)),"_blank");},i*700))}>Enviar todos</Btn>
            </div>
            <div style={{fontSize:11,color:"#92400e",background:"#fffbeb",borderRadius:7,padding:"8px 11px",marginBottom:12}}>O WhatsApp abre para cada membro. Se o navegador bloquear popups, permita-os ou envie um por um abaixo.</div>
            <div style={{maxHeight:320,overflowY:"auto"}}>
              {enviados.map(m=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f8fafc"}}>
                  <Avatar nome={m.nome} foto={m.foto} size={36} />
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{m.nome}</div><div style={{fontSize:11,color:"#94a3b8"}}>{m.telefone}</div></div>
                  <Btn color="green" size="sm" onClick={()=>window.open("https://wa.me/55"+rawTel(m.telefone)+"?text="+encodeURIComponent(buildMsg(selT,m,vars)),"_blank")}>Enviar</Btn>
                </div>
              ))}
            </div>
          </Card>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn color="gray" onClick={()=>setStep("personalizar")}>Voltar</Btn>
            <Btn color="blue" onClick={()=>setStep("template")}>Nova mensagem</Btn>
          </div>
        </div>
      )}
    </div>
  );
}


// ── GESTÃO INFANTIL ────────────────────────────────────────────────────────────
const EMPTY_CRIANCA = {id:null,nome:"",nascimento:"",sexo:"",tipo:"membro",membroId:null,responsavel1:"",tel1:"",responsavel2:"",tel2:"",alergia:"",observacoes:"",foto:null,checkin:false,checkinHora:""};

const WA_TEMPLATES = [
  {id:"checkin",   emoji:"✅", label:"Check-in realizado",  cor:"#dcfce7", borda:"#bbf7d0", texto:"#16a34a",
   msg:(c)=>`Ola, {resp}!\n\n${c.nome} acabou de fazer check-in na *Salinha Infantil* as ${new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}.\n\nEle(a) esta bem e sob cuidado dos monitores. ✝\n\n_Igreja - Ministerio Infantil_`},
  {id:"buscar",    emoji:"🔔", label:"Hora de buscar",      cor:"#fef9c3", borda:"#fde68a", texto:"#92400e",
   msg:(c)=>`Ola, {resp}!\n\nO culto esta chegando ao fim. Por favor, venha buscar *${c.nome}* na Salinha Infantil.\n\nObrigado! ✝\n\n_Igreja - Ministerio Infantil_`},
  {id:"chamar",    emoji:"🚨", label:"Chamar responsavel",  cor:"#fef2f2", borda:"#fecaca", texto:"#dc2626",
   msg:(c)=>`Ola, {resp}!\n\nPrecisamos que voce venha urgente a *Salinha Infantil* por causa de ${c.nome}.\n\nObrigado! ✝`},
  {id:"aviso",     emoji:"📢", label:"Aviso geral",         cor:"#eff6ff", borda:"#bfdbfe", texto:"#2563eb",
   msg:(c)=>`Ola, {resp}!\n\nInformacao importante sobre ${c.nome} na Salinha Infantil.\n\nEm caso de duvidas, fale com um monitor. ✝\n\n_Igreja - Ministerio Infantil_`},
  {id:"aniver",    emoji:"🎂", label:"Parabens",            cor:"#fdf4ff", borda:"#e9d5ff", texto:"#7c3aed",
   msg:(c)=>`Parabens, ${c.nome}! 🎉🎂\n\nQue Deus abencoe cada dia da sua vida!\n\n_Com carinho, Igreja - Ministerio Infantil_ ✝`},
];

function InfantilView({members, showToast}) {
  const [criancas, setCriancas]   = useState([]);
  const [view, setView]           = useState("lista");
  const [form, setForm]           = useState(EMPTY_CRIANCA);
  const [editing, setEditing]     = useState(null);
  const [detalhe, setDetalhe]     = useState(null);
  const [search, setSearch]       = useState("");
  const [filtro, setFiltro]       = useState("todos");
  const [modalWA, setModalWA]     = useState(null); // {crianca, resp, tel}
  const [selTemplate, setSelTemplate] = useState(null);
  const hf = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    (async()=>{
      try{const r=localStorage.getItem("church_criancas");if(r){setCriancas(JSON.parse(r));return;}}catch(e){}
      try{const r=await window.storage.get("church_criancas");if(r?.value){const d=JSON.parse(r.value);setCriancas(d);localStorage.setItem("church_criancas",r.value);}}catch(e){}
    })();
  },[]);

  const saveCriancas = async list => {
    const json=JSON.stringify(list);
    try{localStorage.setItem("church_criancas",json);}catch(e){}
    try{fbSet("church/criancas", list);}catch(e){}
    try{await window.storage.set("church_criancas",json);}catch(e){}
  };

  function onSelectMembro(membroId) {
    hf("membroId", membroId ? Number(membroId) : null);
    if (membroId) {
      const m = members.find(mb=>mb.id===Number(membroId));
      if (m) {
        setForm(f=>({...f, membroId:Number(membroId), responsavel1:m.nome, tel1:m.telefone||"", responsavel2:m.conjugeNome||f.responsavel2}));
      }
    }
  }

  async function salvar() {
    if (!form.nome.trim()) { showToast("Nome da crianca e obrigatorio","error"); return; }
    if (!form.responsavel1.trim()) { showToast("Informe o responsavel","error"); return; }
    const nova = {...form, id: editing || Date.now()};
    const updated = editing ? criancas.map(c=>c.id===editing?nova:c) : [...criancas, nova];
    setCriancas(updated); await saveCriancas(updated);
    showToast(editing?"Atualizado!":"Crianca cadastrada!");
    setView("lista"); setEditing(null); setForm(EMPTY_CRIANCA);
  }

  async function excluir(id) {
    if (!window.confirm("Excluir esta crianca?")) return;
    const updated = criancas.filter(c=>c.id!==id);
    setCriancas(updated); await saveCriancas(updated);
    showToast("Removido","error"); setDetalhe(null); setView("lista");
  }

  async function toggleCheckin(crianca) {
    const agora = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const updated = criancas.map(c=>c.id===crianca.id
      ? {...c, checkin:!c.checkin, checkinHora: !c.checkin ? agora : ""}
      : c);
    setCriancas(updated); await saveCriancas(updated);
    showToast(!crianca.checkin ? `Check-in de ${crianca.nome}!` : `Check-out de ${crianca.nome}!`);
    if (detalhe?.id===crianca.id) setDetalhe(updated.find(c=>c.id===crianca.id));
  }

  function calcIdade(nasc) {
    if (!nasc) return "";
    const h=new Date(); const n=new Date(nasc+"T00:00");
    let anos=h.getFullYear()-n.getFullYear();
    if (h.getMonth()<n.getMonth()||(h.getMonth()===n.getMonth()&&h.getDate()<n.getDate())) anos--;
    if (anos<1) { const m=(h.getFullYear()-n.getFullYear())*12+h.getMonth()-n.getMonth(); return m+" mes"+(m!==1?"es":""); }
    return anos+" ano"+(anos!==1?"s":"");
  }

  function enviarWA(crianca, resp, tel, tpl) {
    if (!tel) { showToast("Sem telefone cadastrado","error"); return; }
    const msg = tpl.msg(crianca).replace(/\{resp\}/g, resp.split(" ")[0]);
    window.open("https://wa.me/55"+rawTel(tel)+"?text="+encodeURIComponent(msg),"_blank");
    setModalWA(null); setSelTemplate(null);
  }

  const membrosAtivos = members.filter(m=>m.ativo);
  const filtered = criancas.filter(c => {
    const q = search.toLowerCase();
    const okQ = !search || c.nome.toLowerCase().includes(q) || c.responsavel1.toLowerCase().includes(q);
    const okF = filtro==="todos"
      || (filtro==="presentes" && c.checkin)
      || (filtro==="membro" && c.tipo==="membro")
      || (filtro==="visitante" && c.tipo==="visitante");
    return okQ && okF;
  });

  const presentes   = criancas.filter(c=>c.checkin).length;
  const totMembro   = criancas.filter(c=>c.tipo==="membro").length;
  const totVisit    = criancas.filter(c=>c.tipo==="visitante").length;

  // ── MODAL WHATSAPP ─────────────────────────────────────────────────────────
  function ModalWA({data}) {
    const {crianca, resp1, tel1, resp2, tel2} = data;
    const [resp, setResp]   = useState(resp1);
    const [tel, setTel]     = useState(tel1);
    const [tpl, setTpl]     = useState(null);

    return (
      <Modal onClose={()=>setModalWA(null)} width={420}>
        <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>Enviar WhatsApp</div>
        <div style={{color:"#64748b",fontSize:13,marginBottom:18}}>Sobre: <b>{crianca.nome}</b></div>

        {/* Escolher responsável */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Destinatario</div>
          <div style={{display:"flex",gap:8}}>
            {[{n:resp1,t:tel1},{n:resp2,t:tel2}].filter(r=>r.n).map((r,i)=>(
              <div key={i} onClick={()=>{setResp(r.n);setTel(r.t);}} style={{flex:1,padding:"10px 12px",borderRadius:10,border:"2px solid",borderColor:resp===r.n?"#25d366":"#e2e8f0",background:resp===r.n?"#f0fdf4":"#f8fafc",cursor:"pointer",transition:"all .15s"}}>
                <div style={{fontWeight:700,fontSize:13}}>{r.n.split(" ").slice(0,2).join(" ")}</div>
                <div style={{fontSize:11,color:"#64748b"}}>{r.t||"Sem tel"}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Templates */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Tipo de mensagem</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {WA_TEMPLATES.map(t=>(
              <div key={t.id} onClick={()=>setTpl(t)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"2px solid",borderColor:tpl?.id===t.id?t.borda:"#e2e8f0",background:tpl?.id===t.id?t.cor:"#f8fafc",cursor:"pointer",transition:"all .15s"}}>
                <span style={{fontSize:18}}>{t.emoji}</span>
                <span style={{fontWeight:600,fontSize:13,color:tpl?.id===t.id?t.texto:"#374151"}}>{t.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Preview */}
        {tpl && (
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:"#166534",whiteSpace:"pre-line"}}>
            {tpl.msg(crianca).replace(/\{resp\}/g,resp.split(" ")[0])}
          </div>
        )}

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn color="gray" onClick={()=>setModalWA(null)}>Cancelar</Btn>
          <Btn color="green" onClick={()=>tpl?enviarWA(crianca,resp,tel,tpl):showToast("Selecione uma mensagem","error")}>
            Enviar no WhatsApp
          </Btn>
        </div>
      </Modal>
    );
  }

  // ── DETALHE ────────────────────────────────────────────────────────────────
  if (view==="detalhe" && detalhe) {
    const c = criancas.find(x=>x.id===detalhe.id)||detalhe;
    const membroVinc = c.membroId ? members.find(m=>m.id===c.membroId) : null;
    return (
      <div>
        {modalWA && <ModalWA data={modalWA}/>}
        <div style={{marginBottom:14,display:"flex",gap:8,alignItems:"center"}}>
          <Btn color="gray" size="sm" onClick={()=>setView("lista")}>← Voltar</Btn>
          <Btn color={c.checkin?"red":"blue"} size="sm" onClick={()=>toggleCheckin(c)}>{c.checkin?"Check-out":"Check-in"}</Btn>
          <Btn color="gray" size="sm" onClick={()=>{setForm({...c});setEditing(c.id);setView("form");}}>Editar</Btn>
          <Btn color="red" size="sm" onClick={()=>excluir(c.id)}>Excluir</Btn>
        </div>

        <Card>
          {/* Header perfil */}
          <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:22,flexWrap:"wrap"}}>
            <div style={{position:"relative"}}>
              <Avatar nome={c.nome} foto={c.foto} size={80}/>
              <div style={{position:"absolute",bottom:-4,right:-4,width:24,height:24,borderRadius:"50%",background:c.checkin?"#059669":"#94a3b8",border:"3px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800}}>
                {c.checkin?"✓":"–"}
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                <span style={{fontWeight:800,fontSize:20}}>{c.nome}</span>
                <span style={{background:c.tipo==="visitante"?"#fef3c7":"#eff6ff",color:c.tipo==="visitante"?"#92400e":"#2563eb",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,border:`1px solid ${c.tipo==="visitante"?"#fde68a":"#bfdbfe"}`}}>
                  {c.tipo==="visitante"?"Visitante":"Filho de Membro"}
                </span>
                {c.checkin && <span style={{background:"#dcfce7",color:"#16a34a",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>Na salinha desde {c.checkinHora}</span>}
              </div>
              {c.nascimento && <div style={{fontSize:13,color:"#64748b"}}>{calcIdade(c.nascimento)} &nbsp;·&nbsp; Nasc: {ptDate(c.nascimento)}</div>}
              {c.sexo && <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{c.sexo}</div>}
            </div>
          </div>

          {/* Alertas */}
          {c.alergia && (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#fef2f2",borderRadius:10,borderLeft:"4px solid #dc2626",marginBottom:12}}>
              <span style={{fontSize:18}}>⚠️</span>
              <div><div style={{fontWeight:700,fontSize:12,color:"#dc2626"}}>ALERGIA / RESTRICAO</div><div style={{fontSize:13,color:"#7f1d1d"}}>{c.alergia}</div></div>
            </div>
          )}
          {c.observacoes && (
            <div style={{padding:"10px 14px",background:"#fefce8",borderRadius:10,borderLeft:"4px solid #fbbf24",marginBottom:16,fontSize:13,color:"#78350f"}}>
              <b>Obs:</b> {c.observacoes}
            </div>
          )}

          {/* Membro vinculado */}
          {membroVinc && (
            <div style={{marginBottom:16,padding:"10px 12px",background:"#eff6ff",borderRadius:10,border:"1px solid #bfdbfe",display:"flex",alignItems:"center",gap:10}}>
              <Avatar nome={membroVinc.nome} foto={membroVinc.foto} size={38}/>
              <div><div style={{fontSize:11,fontWeight:600,color:"#1d4ed8"}}>Membro vinculado</div><div style={{fontSize:14,fontWeight:700}}>{membroVinc.nome}</div></div>
            </div>
          )}

          {/* Responsáveis */}
          <div style={{fontWeight:700,fontSize:12,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Responsaveis</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[{nome:c.responsavel1,tel:c.tel1,label:"Responsavel 1"},{nome:c.responsavel2,tel:c.tel2,label:"Responsavel 2"}].map((r,i)=>r.nome?(
              <div key={i} style={{background:"#f8fafc",borderRadius:12,padding:12,border:"1px solid #e2e8f0"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <Avatar nome={r.nome} size={38}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nome}</div>
                    <div style={{fontSize:11,color:"#64748b"}}>{r.tel||"Sem telefone"}</div>
                  </div>
                </div>
                {r.tel && (
                  <button
                    onClick={()=>setModalWA({crianca:c,resp1:c.responsavel1,tel1:c.tel1,resp2:c.responsavel2,tel2:c.tel2})}
                    style={{width:"100%",padding:"7px",background:"linear-gradient(135deg,#25d366,#128c7e)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>

      </Card>
    </div>
  );

// ── PRIMEIRO CADASTRO ─────────────────────────────────────────────────────────
async function markCadastroCompleto(userId) {
  try {
    const r = await storageGet("church_auth");
    if (r?.value) {
      const auth = JSON.parse(r.value);
      auth.admins = auth.admins.map(a => a.id === userId ? {...a, cadastroCompleto:true} : a);
      await storageSet("church_auth", JSON.stringify(auth));
    }
  } catch(e) {}
}

function PrimeiroCadastro({ user, onComplete, onLogout, members, setMembers, save }) {
  const [modo, setModo] = useState("jatem"); // "jatem" | "novo"
  const [form, setForm] = useState({
    nome: user.nome !== "Administrador" ? user.nome : "",
    telefone: "", nascimento: "", foto: null,
    endereco: "", numero: "", bairro: "", cidade: "", cep: "",
    cargo: "Membro", ministerio: "Nenhum",
  });
  const [jaForm, setJaForm]     = useState({ nome: "" });
  const [jaErr, setJaErr]       = useState("");
  const [jaOk, setJaOk]         = useState(false);
  const [aceitouTermos, setAceitouTermos] = useState(false);
  const [novoPIN, setNovoPIN]   = useState({ pin:"", confirmar:"" });
  const [jaChecking, setJaChecking] = useState(false);
  const [errors, setErrors]     = useState({});
  const [showLeave, setShowLeave] = useState(false);
  const [saving, setSaving]     = useState(false);
  const [welcome, setWelcome]   = useState(false);
  const [welcomeName, setWelcomeName] = useState("");
  const [welcomeFoto, setWelcomeFoto] = useState(null);
  const hf = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:undefined})); };

  useEffect(() => {
    const handler = e => { e.preventDefault(); e.returnValue = ""; setShowLeave(true); };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, []);

  // ── VERIFICAR "JÁ SOU CADASTRADO" ──────────────────────────────────────────
  async function verificarJaCadastrado() {
    setJaErr("");
    const nomeBusca = jaForm.nome.trim().toLowerCase();
    if (!nomeBusca) { setJaErr("Informe seu nome completo"); return; }
    setJaChecking(true);

    try {
      // Você já autenticou com seu PIN na tela de acesso.
      // Aqui só verificamos se você está na lista de membros.
      let membrosAtual = members;
      if (!membrosAtual || membrosAtual.length === 0) {
        try {
          const fbData = await fbGet("church/members");
          if (fbData && Array.isArray(fbData)) membrosAtual = fbData;
          else { const local = await loadEncrypted("church_members"); membrosAtual = local || []; }
        } catch(e) { membrosAtual = []; }
      }

      const palavras = nomeBusca.split(" ").filter(p => p.length > 1);
      const membro = membrosAtual.find(m =>
        m.ativo && m.nome &&
        palavras.every(p => m.nome.toLowerCase().includes(p))
      );

      if (!membro) {
        setJaErr(`Nenhum membro encontrado com o nome "${jaForm.nome.trim()}". Verifique se digitou corretamente ou use "Cadastre-se".`);
        setJaChecking(false); return;
      }

      // Encontrado → marcar como completo e entrar
      setJaOk(true);
      setWelcomeName(membro.nome);
      setWelcomeFoto(membro.foto || null);
      await markCadastroCompleto(user.id);
      setWelcome(true);
      setTimeout(() => onComplete({...user, cadastroCompleto:true}), 2600);
    } catch(e) {
      setJaErr("Erro ao verificar. Tente novamente.");
    }
    setJaChecking(false);
  }

  // ── NOVO CADASTRO ───────────────────────────────────────────────────────────
  function validate() {
    const e = {};
    if (!form.nome.trim())                e.nome       = "Nome é obrigatório";
    if (!form.telefone.replace(/\D/g,"")) e.telefone   = "Telefone é obrigatório";
    if (!form.nascimento)                 e.nascimento = "Data de nascimento é obrigatória";
    if (!form.foto)                       e.foto       = "Foto é obrigatória";
    if (!form.endereco.trim())            e.endereco   = "Endereço é obrigatório";
    if (!form.cidade.trim())              e.cidade     = "Cidade é obrigatória";
    if (novoPIN.pin.length >= 4) {
      if (novoPIN.pin !== novoPIN.confirmar) e.confirmarPIN = "Os PINs não coincidem";
    } else if (novoPIN.pin.length > 0) {
      e.pin = "PIN deve ter pelo menos 4 dígitos";
    }
    return e;
  }

  async function handleFoto(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => { const resized = await resizeFoto(ev.target.result); hf("foto", resized); };
    reader.readAsDataURL(file);
  }

  async function handleSubmit() {
    if (!aceitouTermos) { setErrors(e=>({...e,termos:"Você precisa aceitar os termos para continuar"})); return; }
    const errs = validate(); setErrors(errs);
    if (Object.keys(errs).length > 0) return;
    setSaving(true);
    try {
      const enderecoFull = [form.endereco.trim(), form.numero.trim(), form.bairro.trim()].filter(Boolean).join(", ");
      const newMember = { ...EMPTY_MEMBER, id: Date.now(),
        nome: form.nome.trim(), telefone: form.telefone, nascimento: form.nascimento,
        foto: form.foto, endereco: enderecoFull, cidade: form.cidade.trim(),
        cep: form.cep, cargo: form.cargo, ministerio: form.ministerio,
        ativo: true, dataMembresia: hoje(), _adminId: user.id };
      const updated = [...members, newMember];
      setMembers(updated); await save(updated);
      await markCadastroCompleto(user.id);
      // Se o usuário definiu um PIN novo, salvar
      if (novoPIN.pin.length >= 4 && novoPIN.pin === novoPIN.confirmar) {
        try {
          const rp = await storageGet("church_auth");
          if (rp?.value) {
            const authP = JSON.parse(rp.value);
            authP.admins = authP.admins.map(a =>
              a.id === user.id ? {...a, pin: hashPin(novoPIN.pin), pinTrocado: true} : a
            );
            await storageSet("church_auth", JSON.stringify(authP));
          }
        } catch(ep) {}
      }
      setWelcomeName(newMember.nome);
      setWelcomeFoto(newMember.foto);
      setWelcome(true);
      setTimeout(() => onComplete({...user, cadastroCompleto:true}), 2800);
    } catch(e) { setSaving(false); }
  }

  // ── TELA BEM-VINDO ──────────────────────────────────────────────────────────
  if (welcome) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#8b3230,#5c1a18)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
      <style>{`@keyframes successPop{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}} @keyframes spinLoader{to{transform:rotate(360deg)}}`}</style>
      <div style={{textAlign:"center",animation:"successPop 0.5s ease both"}}>
        <div style={{width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,0.15)",border:"3px solid rgba(255,255,255,0.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",boxShadow:"0 0 40px rgba(255,255,255,0.2)"}}>
          {welcomeFoto ? <img src={welcomeFoto} style={{width:94,height:94,borderRadius:"50%",objectFit:"cover"}} alt="foto"/> : <span style={{fontSize:40}}>✝</span>}
        </div>
        <div style={{color:"#fff",fontWeight:800,fontSize:26,marginBottom:8}}>Bem-vindo(a)!</div>
        <div style={{color:"rgba(255,255,255,0.8)",fontSize:16,marginBottom:6}}>{welcomeName}</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:13}}>Identidade verificada com sucesso.</div>
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:20}}>Entrando no sistema...</div>
        <div style={{width:36,height:36,borderRadius:"50%",border:"3px solid rgba(255,255,255,0.2)",borderTopColor:"rgba(255,255,255,0.8)",animation:"spinLoader 0.9s linear infinite",margin:"14px auto 0"}}/>
      </div>
    </div>
  );

  const ERR = {fontSize:11,color:"#dc2626",marginTop:3};
  const haErr = k => errors[k] ? {borderColor:"#fca5a5"} : {};

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"system-ui,sans-serif"}}>
      <style>{`@keyframes spinLoader{to{transform:rotate(360deg)}} @keyframes successPop{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}`}</style>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#742a28,#5c1a18)",padding:"18px 20px",display:"flex",alignItems:"center",gap:14,position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>
        <img src={LOGO_B64} style={{width:38,height:38,objectFit:"contain",borderRadius:8,background:"rgba(255,255,255,0.1)",padding:3}} alt="Logo"/>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Verificação de Identidade</div>
          <div style={{color:"rgba(255,255,255,0.65)",fontSize:11}}>Obrigatório para acessar o sistema</div>
        </div>
        <div style={{marginLeft:"auto",background:"rgba(255,255,255,0.12)",borderRadius:20,padding:"4px 12px",color:"rgba(255,255,255,0.8)",fontSize:11,fontWeight:600}}>1ª entrada</div>
      </div>

      {/* Abas */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex"}}>
        <button onClick={()=>{setModo("jatem");setJaErr("");setErrors({});}} style={{
          flex:1,padding:"14px 0",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
          background:"transparent",borderBottom:modo==="jatem"?"3px solid #742a28":"3px solid transparent",
          color:modo==="jatem"?"#742a28":"#64748b",transition:"all 0.15s"
        }}>🔐 Já sou cadastrado</button>
        <button onClick={()=>{setModo("novo");setJaErr("");setErrors({});}} style={{
          flex:1,padding:"14px 0",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
          background:"transparent",borderBottom:modo==="novo"?"3px solid #742a28":"3px solid transparent",
          color:modo==="novo"?"#742a28":"#64748b",transition:"all 0.15s"
        }}>📝 Cadastre-se</button>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:"24px 16px 40px"}}>

        {/* ── ABA: JÁ SOU CADASTRADO ── */}
        {modo === "jatem" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:"14px 16px",fontSize:13,color:"#1d4ed8",lineHeight:1.6}}>
              ✅ <b>Seu acesso foi verificado pelo PIN.</b><br/>
              Agora confirme seu nome completo como está na lista de membros para liberar o sistema.
            </div>

            <Field label="Seu nome completo (como está no cadastro)">
              <input style={INP} value={jaForm.nome} onChange={e=>{setJaForm(f=>({...f,nome:e.target.value}));setJaErr("");}}
                placeholder="Ex: João da Silva"
                onKeyDown={e=>e.key==="Enter"&&verificarJaCadastrado()} />
            </Field>

            {jaErr && (
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#dc2626",lineHeight:1.5}}>
                ❌ {jaErr}
              </div>
            )}

            <button onClick={verificarJaCadastrado} disabled={jaChecking || jaOk} style={{
              width:"100%",padding:"14px",borderRadius:12,border:"none",
              background:jaChecking||jaOk?"#94a3b8":"linear-gradient(135deg,#059669,#047857)",
              color:"#fff",fontWeight:700,fontSize:14,cursor:jaChecking||jaOk?"not-allowed":"pointer",
              boxShadow:"0 4px 16px rgba(5,150,105,0.3)",
              display:"flex",alignItems:"center",justifyContent:"center",gap:8
            }}>
              {jaChecking
                ? <><span style={{width:16,height:16,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",animation:"spinLoader 0.8s linear infinite",display:"inline-block"}}/> Verificando...</>
                : jaOk ? "✅ Verificado!" : "🔍 Verificar e Entrar"
              }
            </button>

            <button onClick={()=>setShowLeave(true)} style={{
              width:"100%",padding:"10px",borderRadius:10,border:"1px solid #e2e8f0",
              background:"#f8fafc",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:500
            }}>Sair do sistema</button>
          </div>
        )}

        {/* ── ABA: NOVO CADASTRO ── */}
        {modo === "novo" && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#92400e"}}>
              ⚠️ Preencha todos os campos obrigatórios (<b>*</b>) para acessar o sistema.
            </div>

            {/* Foto */}
            <div style={{textAlign:"center"}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <div style={{width:90,height:90,borderRadius:"50%",overflow:"hidden",border:errors.foto?"3px solid #fca5a5":"3px solid #e2e8f0",background:"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}
                  onClick={()=>document.getElementById("foto-upload").click()}>
                  {form.foto
                    ? <img src={form.foto} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="foto"/>
                    : <div style={{textAlign:"center",color:"#94a3b8"}}><div style={{fontSize:28}}>📷</div><div style={{fontSize:10,marginTop:2}}>Foto *</div></div>}
                </div>
                <input id="foto-upload" type="file" accept="image/*" style={{display:"none"}} onChange={handleFoto}/>
                <div style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:"#742a28",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"2px solid #fff"}}
                  onClick={()=>document.getElementById("foto-upload").click()}>
                  <span style={{color:"#fff",fontSize:12}}>+</span>
                </div>
              </div>
              {errors.foto && <div style={{...ERR,textAlign:"center"}}>{errors.foto}</div>}
            </div>

            <Field label="Nome completo *">
              <input style={{...INP,...haErr("nome")}} value={form.nome} onChange={e=>hf("nome",e.target.value)} placeholder="Seu nome completo"/>
              {errors.nome && <div style={ERR}>{errors.nome}</div>}
            </Field>
            <Field label="Telefone / WhatsApp *">
              <input style={{...INP,...haErr("telefone")}} value={form.telefone} onChange={e=>hf("telefone",fTel(e.target.value))} placeholder="(11) 99999-9999" inputMode="tel"/>
              {errors.telefone && <div style={ERR}>{errors.telefone}</div>}
            </Field>
            <Field label="Data de Nascimento *">
              <input type="date" style={{...INP,...haErr("nascimento")}} value={form.nascimento} onChange={e=>hf("nascimento",e.target.value)}/>
              {errors.nascimento && <div style={ERR}>{errors.nascimento}</div>}
            </Field>
            <Field label="Endereço (Rua/Av.) *">
              <input style={{...INP,...haErr("endereco")}} value={form.endereco} onChange={e=>hf("endereco",e.target.value)} placeholder="Rua ou Avenida"/>
              {errors.endereco && <div style={ERR}>{errors.endereco}</div>}
            </Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Número"><input style={INP} value={form.numero} onChange={e=>hf("numero",e.target.value)} placeholder="123"/></Field>
              <Field label="Bairro"><input style={INP} value={form.bairro} onChange={e=>hf("bairro",e.target.value)} placeholder="Bairro"/></Field>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10}}>
              <Field label="Cidade *">
                <input style={{...INP,...haErr("cidade")}} value={form.cidade} onChange={e=>hf("cidade",e.target.value)} placeholder="Diadema"/>
                {errors.cidade && <div style={ERR}>{errors.cidade}</div>}
              </Field>
              <Field label="CEP">
                <input style={{...INP,width:110}} value={form.cep} onChange={e=>hf("cep",fCEP(e.target.value))} placeholder="09000-000" inputMode="numeric"/>
              </Field>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Cargo *">
                <select style={SEL} value={form.cargo} onChange={e=>hf("cargo",e.target.value)}>
                  {CARGOS.map(c=><option key={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="Ministério *">
                <select style={SEL} value={form.ministerio} onChange={e=>hf("ministerio",e.target.value)}>
                  {MINISTERIOS.map(m=><option key={m}>{m}</option>)}
                </select>
              </Field>
            </div>

            {/* ── Definir PIN ── */}
            

            {/* Checkbox de licença — desmarcado por padrão */}
            <div style={{
              background: errors.termos ? "#fef2f2" : "#f8fafc",
              border: errors.termos ? "1px solid #fca5a5" : "1px solid #e2e8f0",
              borderRadius:10, padding:"12px 14px",
            }}>
              <label style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}}>
                <div onClick={()=>{setAceitouTermos(v=>!v);setErrors(e=>({...e,termos:undefined}));}} style={{
                  width:22,height:22,borderRadius:6,flexShrink:0,marginTop:1,
                  border: aceitouTermos ? "none" : "2px solid #cbd5e1",
                  background: aceitouTermos ? "linear-gradient(135deg,#742a28,#5c1a18)" : "#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"all 0.15s",cursor:"pointer",
                  boxShadow: aceitouTermos ? "0 2px 8px rgba(116,42,40,0.3)" : "none",
                }}>
                  {aceitouTermos && (
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  )}
                </div>
                <div style={{fontSize:12,color:"#475569",lineHeight:1.6}}>
                  <span style={{fontWeight:700,color:"#1e293b"}}>Li e aceito os termos de uso</span><br/>
                  Confirmo que os dados informados são verdadeiros e autorizo o armazenamento conforme a <span style={{color:"#742a28",fontWeight:600}}>LGPD</span>.
                </div>
              </label>
              {errors.termos && <div style={{fontSize:11,color:"#dc2626",marginTop:8,paddingLeft:34}}>⚠️ {errors.termos}</div>}
            </div>

            <button onClick={handleSubmit} disabled={saving} style={{
              width:"100%",padding:"15px",borderRadius:12,border:"none",
              background:saving?"#94a3b8":"linear-gradient(135deg,#742a28,#5c1a18)",
              color:"#fff",fontWeight:700,fontSize:15,cursor:saving?"not-allowed":"pointer",
              marginTop:4,boxShadow:"0 4px 16px rgba(116,42,40,0.35)",
              display:"flex",alignItems:"center",justifyContent:"center",gap:8
            }}>
              {saving
                ? <><span style={{width:18,height:18,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",animation:"spinLoader 0.8s linear infinite",display:"inline-block"}}/> Salvando...</>
                : <>✅ Concluir Cadastro e Entrar</>}
            </button>
            <button onClick={()=>setShowLeave(true)} style={{
              width:"100%",padding:"10px",borderRadius:10,border:"1px solid #e2e8f0",
              background:"#f8fafc",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:500
            }}>Sair do sistema</button>
          </div>
        )}
      </div>

      {/* Modal de aviso ao sair */}
      {showLeave && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:28,maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:44,marginBottom:12}}>🚫</div>
            <div style={{fontWeight:800,fontSize:17,color:"#1e293b",marginBottom:8}}>Verificação incompleta!</div>
            <div style={{color:"#475569",fontSize:13,lineHeight:1.6,marginBottom:22}}>
              Você ainda não verificou sua identidade.<br/>
              <b>Sair agora encerrará sua sessão.</b>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>setShowLeave(false)} style={{
                padding:"12px",borderRadius:10,border:"none",
                background:"linear-gradient(135deg,#742a28,#5c1a18)",
                color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"
              }}>← Continuar verificação</button>
              <button onClick={()=>{ setShowLeave(false); onLogout(); }} style={{
                padding:"10px",borderRadius:10,border:"1px solid #fca5a5",
                background:"#fef2f2",color:"#dc2626",fontWeight:600,fontSize:13,cursor:"pointer"
              }}>Sair e encerrar sessão</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HomeCard({def:c, onClick, stat}) {
  const [pressed, setPressed] = React.useState(false);
  const Ico = c.Icon;
  return (
    <button onClick={onClick}
      onTouchStart={()=>setPressed(true)} onTouchEnd={()=>setPressed(false)}
      onMouseDown={()=>setPressed(true)} onMouseUp={()=>setPressed(false)} onMouseLeave={()=>setPressed(false)}
      style={{
        background: pressed ? c.light : "#fff",
        border: "1.5px solid " + (pressed ? c.color+"33" : "#f1f5f9"),
        borderRadius:20, padding:"20px 12px 18px",
        display:"flex", flexDirection:"column", alignItems:"center", gap:12,
        cursor:"pointer", outline:"none", textAlign:"center",
        transform: pressed ? "scale(0.96)" : "scale(1)",
        transition:"all 0.15s ease",
        boxShadow: pressed ? "none" : "0 1px 8px rgba(0,0,0,0.06)",
        WebkitTapHighlightColor:"transparent",
        width:"100%",
      }}>
      <div style={{width:60,height:60,borderRadius:18,background:c.light,
        display:"flex",alignItems:"center",justifyContent:"center",color:c.color,flexShrink:0}}>
        <Ico/>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontWeight:700,fontSize:13.5,color:"#0f172a",lineHeight:1.3}}>{c.label}</div>
        {stat && <div style={{fontSize:11,color:"#94a3b8"}}>{stat}</div>}
      </div>
    </button>
  );
}

function HomeView({user, members, isAdmin, setNav, showToast}) {
  const hora = new Date().getHours();
  const saudacao = hora < 12 ? "Bom dia" : hora < 18 ? "Boa tarde" : "Boa noite";
  const primeiroNome = (user?.nome||"").split(" ")[0];
  const ativos   = members.filter(m=>m.ativo).length;
  const total    = members.length;
  const hoje     = new Date();
  const anivHoje = members.filter(m=>{
    if(!m.nascimento) return false;
    const d = new Date(m.nascimento+"T00:00:00");
    return d.getDate()===hoje.getDate() && d.getMonth()===hoje.getMonth();
  }).length;

  const stats = {
    membros:`${ativos} ativos de ${total}`,
    infantil:"Crianças cadastradas",
    aniversario:`${anivHoje} aniversário${anivHoje!==1?"s":""} hoje`,
    agenda:"Próximos eventos",
    oracao:"Compartilhe suas preces",
  };
  const cards = CARD_DEFS.filter(c => !c.adminOnly || isAdmin);

  return (
    <div style={{background:"#f5f6fa", minHeight:"100%", paddingBottom:32}}>

      {/* HEADER */}
      <div style={{
        background:"linear-gradient(150deg,#7a1f1d 0%,#9b3432 60%,#a0391a 100%)",
        padding:"24px 20px 36px", borderRadius:"0 0 36px 36px",
        position:"relative", overflow:"hidden", marginBottom:28,
      }}>
        <div style={{position:"absolute",top:-50,right:-50,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,0.05)"}}/>
        <div style={{position:"absolute",bottom:-40,left:-30,width:140,height:140,borderRadius:"50%",background:"rgba(201,168,76,0.1)"}}/>

        <div style={{display:"flex",alignItems:"center",gap:14,position:"relative",zIndex:1,marginBottom:24}}>
          <div style={{width:50,height:50,borderRadius:16,flexShrink:0,
            background:"linear-gradient(135deg,#c9a84c,#e8d080)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:22,fontWeight:800,color:"#3d0c0a",
            boxShadow:"0 4px 16px rgba(201,168,76,0.45)"}}>
            {primeiroNome[0]?.toUpperCase()||"U"}
          </div>
          <div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{saudacao},</div>
            <div style={{color:"#fff",fontSize:20,fontWeight:700,lineHeight:1.1}}>{primeiroNome} 👋</div>
          </div>
        </div>

        <div style={{display:"flex",gap:10,position:"relative",zIndex:1}}>
          {[{v:total,l:"Membros"},{v:ativos,l:"Ativos"},{v:anivHoje,l:"Aniversários"}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"rgba(255,255,255,0.12)",borderRadius:16,
              padding:"12px 6px",textAlign:"center",backdropFilter:"blur(8px)",
              border:"1px solid rgba(255,255,255,0.15)"}}>
              <div style={{color:"#f5e6c8",fontSize:24,fontWeight:800,lineHeight:1}}>{s.v}</div>
              <div style={{color:"rgba(255,255,255,0.55)",fontSize:10,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* LABEL */}
      <div style={{padding:"0 20px 14px",fontWeight:700,fontSize:13,color:"#64748b",letterSpacing:0.8,textTransform:"uppercase"}}>
        Menu
      </div>

      {/* GRID */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,padding:"0 20px"}}>
        {cards.map((def)=>(
          <HomeCard key={def.key} def={def} onClick={()=>setNav(def.nav)} stat={stats[def.key]}/>
        ))}
      </div>

      {/* VERSÍCULO */}
      <div style={{margin:"24px 20px 0",background:"linear-gradient(135deg,#fffdf0,#fef3c7)",
        borderRadius:22,padding:"20px",border:"1.5px solid #fde68a"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#92400e",letterSpacing:1.5,marginBottom:10}}>
          ✨ VERSÍCULO DO DIA
        </div>
        <div style={{fontSize:15,color:"#78350f",lineHeight:1.75,fontStyle:"italic",fontWeight:500}}>
          "Tudo posso naquele que me fortalece."
        </div>
        <div style={{fontSize:12,color:"#b45309",marginTop:10,fontWeight:700}}>
          — Filipenses 4:13
        </div>
      </div>
    </div>
  );
}

function OracaoView({user, showToast}) {
  const EMPTY = {motivo:"", nome: user?.nome||"", descricao:"", visita:false, ligacao:false, anonimo:false};
  const [form, setForm] = React.useState(EMPTY);
  const [enviados, setEnviados] = React.useState(()=>{
    try{ const r=localStorage.getItem("church_oracoes"); return r?JSON.parse(r):[]; }catch(e){return [];}
  });
  const [view, setView] = React.useState("lista"); // lista | form | mural
  const [confirmDel, setConfirmDel] = React.useState(null);

  // Sync Firebase ao montar
  React.useEffect(()=>{
    (async()=>{
      try{
        const fb = await fbGet("church/oracoes");
        if(fb && Array.isArray(fb) && fb.length > 0){
          setEnviados(fb);
          try{localStorage.setItem("church_oracoes",JSON.stringify(fb));}catch(e){}
        }
      }catch(e){}
    })();
  },[]);

  function saveOracoes(lista) {
    setEnviados(lista);
    try{localStorage.setItem("church_oracoes",JSON.stringify(lista));}catch(e){}
    try{fbSet("church/oracoes", lista);}catch(e){}
  }

  function salvar() {
    if(!form.motivo.trim()){showToast("Informe o motivo","error");return;}
    if(!form.descricao.trim()){showToast("Descreva o pedido","error");return;}
    const novo = {...form, id:Date.now(), em:new Date().toLocaleString("pt-BR"), status:"pendente", autorId:user?.id};
    saveOracoes([novo,...enviados]);
    showToast("🙏 Pedido enviado! Estaremos orando por você.");
    setForm(EMPTY); setView("lista");
  }

  function excluir(id) {
    saveOracoes(enviados.filter(p=>p.id!==id));
    setConfirmDel(null);
    showToast("Pedido removido");
  }

  const MOTIVOS = ["Saúde","Família","Finanças","Trabalho","Relacionamento","Libertação","Salvação de familiar","Outro"];
  const podeExcluir = (p) => p.autorId===user?.id || user?.nivel==="super" || user?.nivel==="admin";

  // ── FORMULÁRIO ──
  if(view==="form") return (
    <div style={{padding:"0 16px 24px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button onClick={()=>setView("lista")} style={{background:"#f1f5f9",border:"none",borderRadius:20,
          padding:"6px 14px",fontSize:12,cursor:"pointer",color:"#64748b",display:"flex",alignItems:"center",gap:4}}>
          ← Voltar
        </button>
        <div style={{fontWeight:700,fontSize:16,color:"#1e293b"}}>Pedido de Oração</div>
      </div>
      <div style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",borderRadius:18,
        padding:"20px",marginBottom:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{fontSize:36,marginBottom:6}}>🙏</div>
        <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Compartilhe sua prece</div>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:4}}>Estaremos orando por você</div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:1,marginBottom:8}}>MOTIVO DA ORAÇÃO *</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {MOTIVOS.map(m=>(
            <button key={m} onClick={()=>setForm(f=>({...f,motivo:m}))} style={{
              padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
              background:form.motivo===m?"#7c3aed":"#f1f5f9",
              color:form.motivo===m?"#fff":"#475569",transition:"all .15s"
            }}>{m}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:1,marginBottom:6}}>SEU NOME</div>
        <input style={{width:"100%",padding:"12px 14px",border:"1px solid #e2e8f0",borderRadius:12,
          fontSize:14,outline:"none",background:form.anonimo?"#f8fafc":"#fff",color:form.anonimo?"#94a3b8":"#1e293b",boxSizing:"border-box"}}
          value={form.anonimo?"Anônimo":form.nome}
          onChange={e=>setForm(f=>({...f,nome:e.target.value}))}
          disabled={form.anonimo} placeholder="Seu nome"/>
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,cursor:"pointer"}}>
          <input type="checkbox" checked={form.anonimo} onChange={e=>setForm(f=>({...f,anonimo:e.target.checked}))}/>
          <span style={{fontSize:12,color:"#64748b"}}>Enviar anonimamente</span>
        </label>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:1,marginBottom:6}}>DESCREVA SEU PEDIDO *</div>
        <textarea style={{width:"100%",padding:"12px 14px",border:"1px solid #e2e8f0",borderRadius:12,
          fontSize:13,outline:"none",resize:"none",minHeight:100,fontFamily:"inherit",boxSizing:"border-box"}}
          value={form.descricao} onChange={e=>setForm(f=>({...f,descricao:e.target.value}))}
          placeholder="Descreva aqui seu pedido de oração..."/>
      </div>
      <div style={{background:"#f8fafc",borderRadius:14,padding:"14px",marginBottom:20,border:"1px solid #e2e8f0"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:1,marginBottom:10}}>GOSTARIA DE RECEBER?</div>
        {[
          {key:"visita",  label:"Uma visita de um membro da igreja", icon:"🏠"},
          {key:"ligacao", label:"Uma ligação de um membro da igreja", icon:"📞"},
        ].map(opt=>(
          <label key={opt.key} style={{display:"flex",alignItems:"center",gap:10,
            marginBottom:10,cursor:"pointer",padding:"8px 10px",borderRadius:10,
            background:form[opt.key]?"#ede9fe":"transparent",transition:"all .15s"}}>
            <input type="checkbox" checked={form[opt.key]}
              onChange={e=>setForm(f=>({...f,[opt.key]:e.target.checked}))}
              style={{width:18,height:18,accentColor:"#7c3aed"}}/>
            <span style={{fontSize:13,color:"#374151"}}>{opt.icon} {opt.label}</span>
          </label>
        ))}
      </div>
      <button onClick={salvar} style={{
        width:"100%",padding:"14px",border:"none",borderRadius:14,cursor:"pointer",
        background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#fff",
        fontSize:15,fontWeight:700,boxShadow:"0 4px 16px rgba(124,58,237,0.4)"
      }}>🙏 Enviar Pedido de Oração</button>
    </div>
  );

  // ── MURAL ──
  if(view==="mural") return (
    <div style={{padding:"0 16px 24px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button onClick={()=>setView("lista")} style={{background:"#f1f5f9",border:"none",borderRadius:20,
          padding:"6px 14px",fontSize:12,cursor:"pointer",color:"#64748b",display:"flex",alignItems:"center",gap:4}}>
          ← Voltar
        </button>
        <div style={{fontWeight:700,fontSize:16,color:"#1e293b"}}>Mural de Orações</div>
        <span style={{marginLeft:"auto",background:"#ede9fe",color:"#7c3aed",borderRadius:20,
          padding:"2px 10px",fontSize:11,fontWeight:700}}>{enviados.length} pedidos</span>
      </div>

      {/* Banner */}
      <div style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",borderRadius:18,
        padding:"16px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:36}}>🕊️</div>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Mural de Pedidos</div>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:12,marginTop:2}}>
            "Orai uns pelos outros" — Tiago 5:16
          </div>
        </div>
      </div>

      {enviados.length===0 ? (
        <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8"}}>
          <div style={{fontSize:48,marginBottom:12}}>🕊️</div>
          <div style={{fontWeight:600,fontSize:14}}>Nenhum pedido ainda</div>
        </div>
      ) : enviados.map(p=>(
        <div key={p.id} style={{background:"#fff",borderRadius:16,padding:"14px",
          marginBottom:12,border:"1px solid #ede9fe",
          boxShadow:"0 2px 8px rgba(0,0,0,0.04)",position:"relative"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <span style={{background:"#ede9fe",color:"#7c3aed",borderRadius:20,
              padding:"3px 10px",fontSize:11,fontWeight:700}}>{p.motivo}</span>
            <span style={{fontSize:10,color:"#94a3b8"}}>{p.em}</span>
          </div>
          <div style={{fontWeight:600,fontSize:13,color:"#1e293b",marginBottom:4}}>
            {p.anonimo?"Anônimo":p.nome}
          </div>
          <div style={{fontSize:12,color:"#64748b",lineHeight:1.5,marginBottom:8}}>{p.descricao}</div>
          {(p.visita||p.ligacao) && (
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {p.visita  && <span style={{background:"#f0fdf4",color:"#16a34a",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:600}}>🏠 Visita</span>}
              {p.ligacao && <span style={{background:"#eff6ff",color:"#2563eb",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:600}}>📞 Ligação</span>}
            </div>
          )}
          {podeExcluir(p) && (
            confirmDel===p.id ? (
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <button onClick={()=>excluir(p.id)} style={{background:"#dc2626",color:"#fff",border:"none",
                  borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  Confirmar exclusão
                </button>
                <button onClick={()=>setConfirmDel(null)} style={{background:"#f1f5f9",color:"#64748b",border:"none",
                  borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>
                  Cancelar
                </button>
              </div>
            ) : (
              <button onClick={()=>setConfirmDel(p.id)} style={{
                background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:8,
                padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",marginTop:4}}>
                🗑 Excluir
              </button>
            )
          )}
        </div>
      ))}
    </div>
  );

  // ── LISTA PESSOAL ──
  const meusPedidos = enviados.filter(p=>p.autorId===user?.id || (!p.autorId && !p.anonimo && p.nome===user?.nome));
  return (
    <div style={{padding:"0 16px 24px"}}>
      {/* Header roxo */}
      <div style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",borderRadius:18,
        padding:"20px",marginBottom:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{fontSize:36,marginBottom:6}}>🙏</div>
        <div style={{color:"#fff",fontWeight:700,fontSize:17}}>Pedidos de Oração</div>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:4}}>
          "Orai uns pelos outros" — Tiago 5:16
        </div>
      </div>

      {/* Botões de ação */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <button onClick={()=>setView("form")} style={{
          padding:"12px",border:"none",borderRadius:14,cursor:"pointer",
          background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#fff",
          fontSize:13,fontWeight:700,boxShadow:"0 4px 16px rgba(124,58,237,0.3)"
        }}>+ Fazer pedido</button>
        <button onClick={()=>setView("mural")} style={{
          padding:"12px",border:"none",borderRadius:14,cursor:"pointer",

      {meusPedidos.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 20px",color:"#94a3b8",
          background:"#faf5ff",borderRadius:16,border:"1px dashed #ddd6fe"}}>

          <div style={{fontSize:12,marginTop:4}}>Clique em "+ Fazer pedido" para compartilhar sua prece</div>

      ) : meusPedidos.map(p=>(
        <div key={p.id} style={{background:"#fff",borderRadius:16,padding:"14px",

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>

              padding:"3px 10px",fontSize:11,fontWeight:700}}>{p.motivo}</span>
            <span style={{fontSize:10,color:"#94a3b8"}}>{p.em}</span>
          </div>
          <div style={{fontSize:12,color:"#64748b",lineHeight:1.5,marginBottom:8}}>{p.descricao}</div>
          {confirmDel===p.id ? (
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>excluir(p.id)} style={{background:"#dc2626",color:"#fff",border:"none",
                borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                Confirmar exclusão
              </button>
              <button onClick={()=>setConfirmDel(null)} style={{background:"#f1f5f9",color:"#64748b",border:"none",
                borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>
                Cancelar
              </button>
            </div>
          ) : (
            <button onClick={()=>setConfirmDel(p.id)} style={{
              background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:8,
              padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
              🗑 Excluir
            </button>
          )}
        </div>
      ))}
    </div>
  );
}


const BottomNav = ({isAdmin, nav, setNav, anivHoje, saving, handleLogout, navLabel, setSecPage}) => {
